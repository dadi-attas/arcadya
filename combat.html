<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#05010f" />
<link rel="icon" type="image/svg+xml" href="../assets/icons/icon.svg" />
<link rel="stylesheet" href="../assets/arcadya-shell.css" />
<script src="../assets/arcadya-shell.js"></script>
<title>ARCADYA — COMBAT</title>
<style>
  :root{
    --bg-0:#05010f; --bg-1:#0b0320;
    --neon-pink:#ff2d95; --neon-cyan:#00e6ff; --neon-purple:#b14bff;
    --neon-yellow:#ffe94a; --neon-green:#3dff9a; --neon-orange:#ff8a3d;
    --text:#fff; --muted:#a79ec9; --danger:#ff4a6b;
    --accent:#b14bff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Heebo",Tahoma,sans-serif;background:var(--bg-0);color:var(--text);overflow:hidden;user-select:none;-webkit-user-select:none;}
  #app{position:relative;width:100vw;height:100vh;height:100dvh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1200px 800px at 50% -10%,rgba(177,75,255,.2),transparent 60%),radial-gradient(900px 600px at 50% 110%,rgba(0,230,255,.15),transparent 60%),linear-gradient(180deg,var(--bg-1) 0%,var(--bg-0) 100%);}
  #stage{position:relative;width:100%;height:100%;max-width:520px;max-height:100%;background:linear-gradient(180deg,#0c0426 0%,#070116 100%);overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.04),0 30px 80px rgba(0,0,0,.6);display:flex;flex-direction:column;}
  @media (min-width:900px){#stage{max-width:440px;max-height:min(900px,95vh);border-radius:28px;border:1px solid rgba(255,255,255,.07);}}

  .hud{position:relative;display:flex;align-items:center;justify-content:space-between;padding:8px 10px;gap:6px;background:linear-gradient(180deg,rgba(255,255,255,.04),transparent);border-bottom:1px solid rgba(255,255,255,.06);z-index:5;}
  .hud-btn{width:36px;height:36px;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .08s;flex:0 0 auto;}
  .hud-btn:active{transform:scale(.92);}
  .hud-btn.exit{color:var(--danger);border-color:rgba(255,74,107,.35);background:rgba(255,74,107,.08);}
  .hud-center{display:flex;gap:10px;align-items:center;flex-wrap:nowrap;}
  .score-group{display:flex;flex-direction:column;align-items:center;line-height:1.1;}
  .label{color:var(--muted);font-size:9px;letter-spacing:2px;}
  .val{font-size:16px;font-weight:800;color:var(--accent);text-shadow:0 0 6px rgba(177,75,255,.55);}
  .val.blue{color:#4a7bff;text-shadow:0 0 6px rgba(74,123,255,.6);}
  .val.red{color:#ff4a6b;text-shadow:0 0 6px rgba(255,74,107,.6);}
  .val.lv{color:var(--neon-cyan);}
  .hud-right{display:flex;gap:6px;}

  .play{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#04010e;}
  canvas{display:block;max-width:100%;max-height:100%;}

  .controls{position:relative;border-top:2px solid rgba(255,255,255,.08);background:linear-gradient(180deg,#0a0320,#050110);padding:14px 14px calc(14px + env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:center;min-height:150px;}
  .dpad{position:relative;width:150px;height:150px;justify-self:start;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);}
  .dpad button{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:22px;cursor:pointer;transition:transform .08s,background .1s;
    -webkit-touch-callout:none;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
  .dpad button:active{transform:scale(.9);background:rgba(177,75,255,.3);}
  .d-up{grid-column:2;grid-row:1;border-top-left-radius:10px;border-top-right-radius:10px;}
  .d-down{grid-column:2;grid-row:3;border-bottom-left-radius:10px;border-bottom-right-radius:10px;}
  .d-left{grid-column:3;grid-row:2;border-top-left-radius:10px;border-bottom-left-radius:10px;}
  .d-right{grid-column:1;grid-row:2;border-top-right-radius:10px;border-bottom-right-radius:10px;}
  .d-center{grid-column:2;grid-row:2;background:transparent;border:none;pointer-events:none;}

  .action-wrap{display:flex;align-items:center;justify-content:center;}
  .action{width:96px;height:96px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ff7bd0,#b14bff 55%,#4a1170 100%);color:#fff;font-weight:900;font-size:16px;letter-spacing:2px;border:none;cursor:pointer;box-shadow:0 0 24px rgba(177,75,255,.55),inset 0 -6px 12px rgba(0,0,0,.3);transition:transform .08s;}
  .action:active{transform:scale(.92);}

  .overlay{position:absolute;inset:0;background:rgba(5,1,15,.85);display:none;align-items:center;justify-content:center;z-index:20;animation:fadeIn .15s ease-out;}
  .overlay.active{display:flex;}
  .overlay-box{width:82%;max-width:320px;text-align:center;background:linear-gradient(180deg,#1a0946,#0c0326);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:24px 20px 20px;box-shadow:0 0 40px rgba(177,75,255,.3);}
  .overlay-title{font-size:18px;font-weight:800;margin-bottom:16px;}
  .overlay-actions{display:flex;gap:10px;justify-content:center;}
  .btn{flex:1;padding:12px 0;border-radius:12px;font-size:15px;font-weight:800;border:1px solid transparent;cursor:pointer;transition:transform .08s;}
  .btn:active{transform:scale(.95);}
  .btn-yes{background:linear-gradient(180deg,#b14bff,#00e6ff);color:#fff;box-shadow:0 6px 20px rgba(177,75,255,.4);}
  .btn-no{background:rgba(255,255,255,.06);color:#fff;border-color:rgba(255,255,255,.15);}
  .pause-label{position:absolute;inset:0;display:none;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:800;letter-spacing:3px;background:rgba(5,1,15,.55);z-index:15;text-shadow:0 0 10px var(--neon-cyan);}
  .pause-label.active{display:flex;}

  .level-banner{position:absolute;top:30%;left:0;right:0;text-align:center;font-size:24px;font-weight:900;letter-spacing:6px;color:#fff;text-shadow:0 0 14px var(--accent);display:none;z-index:4;pointer-events:none;}
  .level-banner.show{display:block;animation:banner 1.6s forwards;}
  @keyframes banner{0%{opacity:0;transform:scale(.7);}20%{opacity:1;transform:scale(1);}80%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(1.1);}}

  .opener{position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,#1a0550 0%,#05010f 80%);display:flex;align-items:center;justify-content:center;z-index:30;animation:openerFade 4s forwards;}
  .opener .gm-name{font-size:clamp(44px,13vw,72px);font-weight:900;letter-spacing:6px;color:#fff;text-shadow:0 0 8px #fff,0 0 18px var(--accent),0 0 36px var(--accent),0 0 60px var(--neon-cyan);animation:openerPulse 1s infinite alternate;text-align:center;}
  @keyframes openerFade{0%{opacity:1;}80%{opacity:1;}100%{opacity:0;visibility:hidden;}}
  @keyframes openerPulse{from{transform:scale(.95);}to{transform:scale(1.05);}}

  .gameover-box .big-score{font-size:38px;font-weight:900;color:var(--accent);text-shadow:0 0 18px var(--accent);margin:6px 0;}
  .gameover-box .verdict{font-size:18px;font-weight:800;letter-spacing:2px;margin-bottom:6px;}
  .gameover-box .verdict.win{color:var(--neon-green);}
  .gameover-box .verdict.lose{color:var(--danger);}
  .gameover-box .note{color:var(--neon-cyan);font-size:13px;letter-spacing:2px;margin-bottom:4px;}
  .gameover-box .hs-note{color:var(--neon-yellow);font-size:13px;letter-spacing:2px;margin-bottom:14px;min-height:18px;}
  .gameover-box .go-actions{display:flex;gap:10px;margin-top:4px;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>
<body>
<div id="app"><div id="stage">
  <div class="hud">
    <button id="btnExit" class="hud-btn exit" aria-label="יציאה">✕</button>
    <div class="hud-center">
      <div class="score-group"><div class="label">YOU</div><div id="youScore" class="val blue">0</div></div>
      <div class="score-group"><div class="label">CPU</div><div id="cpuScore" class="val red">0</div></div>
      <div class="score-group"><div class="label">LEVEL</div><div id="level" class="val lv">1</div></div>
      <div class="score-group"><div class="label">TIME</div><div id="time" class="val">90</div></div>
      <div class="score-group"><div class="label">STREAK</div><div id="streak" class="val">0</div></div>
    </div>
    <div class="hud-right">
      <button id="btnSound" class="hud-btn" aria-label="סאונד">🔊</button>
      <button id="btnPause" class="hud-btn" aria-label="פאוז">⏸</button>
    </div>
  </div>

  <div class="play">
    <canvas id="game"></canvas>
    <div id="levelBanner" class="level-banner">LEVEL 1</div>
    <div id="pauseLabel" class="pause-label">המשחק מושהה</div>
  </div>

  <div class="controls">
    <div class="dpad">
      <button class="d-up"    data-dir="up">▲</button>
      <button class="d-right" data-dir="right">▶</button>
      <button class="d-center" tabindex="-1"></button>
      <button class="d-left"  data-dir="left">◀</button>
      <button class="d-down"  data-dir="down">▼</button>
    </div>
    <div class="action-wrap">
      <button id="btnAction" class="action">FIRE</button>
    </div>
  </div>

  <div id="opener" class="opener"><div class="gm-name">COMBAT</div></div>

  <div id="exitModal" class="overlay">
    <div class="overlay-box">
      <div class="overlay-title">לצאת מהמשחק?</div>
      <div class="overlay-actions">
        <button id="exitYes" class="btn btn-yes">כן</button>
        <button id="exitNo"  class="btn btn-no">לא</button>
      </div>
    </div>
  </div>

  <div id="gameOver" class="overlay">
    <div class="overlay-box gameover-box">
      <div id="goTitle" class="overlay-title">סיום סיבוב</div>
      <div id="verdict" class="verdict">&nbsp;</div>
      <div id="finalScore" class="big-score">0 : 0</div>
      <div id="goNote" class="note">&nbsp;</div>
      <div id="hsNote" class="hs-note">&nbsp;</div>
      <div class="go-actions">
        <button id="playAgain" class="btn btn-yes">סיבוב חדש</button>
        <button id="backHome"  class="btn btn-no">חזרה ל־ARCADYA</button>
      </div>
    </div>
  </div>
</div></div>

<script>
const SFX = ARCADYA.makeSFX({
  fire:   beep => { beep(720,0.05,'square',0.08); setTimeout(()=>beep(440,0.04,'square',0.06),30); },
  bounce: beep => beep(380,0.04,'square',0.06),
  hit:    beep => { beep(220,0.18,'sawtooth',0.16); setTimeout(()=>beep(110,0.25,'sawtooth',0.12),120); },
  win:    beep => { beep(660,0.08,'triangle',0.12); setTimeout(()=>beep(990,0.1,'triangle',0.12),80); setTimeout(()=>beep(1320,0.16,'triangle',0.12),170); },
  lose:   beep => { beep(330,0.18,'sawtooth',0.14); setTimeout(()=>beep(165,0.3,'sawtooth',0.12),200); }
});

/* ====== Shell ====== */
const HS_KEY = 'arcadya_combat_high_score';
const $ = id => document.getElementById(id);
let paused=false, gameOverShown=false, running=false;

SFX.open();
setTimeout(()=>{ $('opener').style.display='none'; startGame(); }, 4000);

function refreshSoundBtn(){ $('btnSound').textContent = SFX.isMuted() ? '🔇' : '🔊'; }
refreshSoundBtn();
$('btnSound').addEventListener('click', ()=>{ SFX.toggle(); refreshSoundBtn(); SFX.click(); });

$('btnPause').addEventListener('click', togglePause);
function togglePause(){
  if(gameOverShown) return;
  paused = !paused;
  $('btnPause').textContent = paused ? '▶' : '⏸';
  $('pauseLabel').classList.toggle('active', paused);
  SFX.click();
}

$('btnExit').addEventListener('click', ()=>{ SFX.click(); $('exitModal').classList.add('active'); if(!paused) togglePause(); });
$('exitNo').addEventListener('click', ()=>{ SFX.click(); $('exitModal').classList.remove('active'); if(paused) togglePause(); });
$('exitYes').addEventListener('click', ()=>{ window.location.href = '../index.html?home=1'; });

$('playAgain').addEventListener('click', ()=>{ SFX.click(); $('gameOver').classList.remove('active'); gameOverShown = false; startGame(); });
$('backHome').addEventListener('click',  ()=>{ window.location.href = '../index.html?home=1'; });

/* ====== Field ====== */
const DESIGN_W = 340;
const DESIGN_H = 480;
const TANK_R = 13;           // half-size — bigger tanks (26×26)
const BULLET_SIZE = 4;
const BULLET_SPEED = 2.6;
const TANK_SPEED = 0.8;      // slower, more deliberate movement
const TANK_TURN = 0.05;
const MAX_BOUNCES = 3;
const SCORE_TO_WIN = 15;
const ROUND_SECONDS = 90;

/* Per-level tuning */
function levelConfig(level){
  // Range shrinks every level (longer baseline now), AI sharpens slightly
  const range = Math.max(160, 360 - (level-1)*40);
  const cpuTurn  = Math.min(0.07, 0.025 + (level-1)*0.008);
  const cpuSpeed = Math.min(1.0, 0.75 + (level-1)*0.06);
  const cpuFireCd = Math.max(450, 900 - (level-1)*100);
  const cpuAimAcc = Math.min(0.3, 0.12 + (level-1)*0.04);  // tolerance to fire
  return { range, cpuTurn, cpuSpeed, cpuFireCd, cpuAimAcc };
}

/* Walls per level — each: {x, y, w, h} */
function wallsForLevel(level){
  // Always: outer borders are implicit (handled in physics).
  // Player bunker (bottom) + CPU bunker (top): a single "shield" wall in front
  const walls = [
    { x: 130, y: 410, w: 80, h: 6 },   // player shield
    { x: 130, y: 64,  w: 80, h: 6 },   // CPU shield
  ];
  if(level >= 2){
    walls.push({ x: 60,  y: 220, w: 6, h: 40 });
    walls.push({ x: 274, y: 220, w: 6, h: 40 });
  }
  if(level >= 3){
    walls.push({ x: 110, y: 180, w: 60, h: 6 });
    walls.push({ x: 170, y: 290, w: 60, h: 6 });
  }
  if(level >= 4){
    walls.push({ x: 40,  y: 110, w: 6,  h: 36 });
    walls.push({ x: 294, y: 320, w: 6,  h: 36 });
    walls.push({ x: 40,  y: 320, w: 6,  h: 36 });
    walls.push({ x: 294, y: 110, w: 6,  h: 36 });
  }
  if(level >= 5){
    // Random-ish flavor walls
    walls.push({ x: 100 + ((level*7)%80), y: 240, w: 30, h: 6 });
    walls.push({ x: 200 + ((level*5)%60), y: 240, w: 30, h: 6 });
  }
  return walls;
}

/* ====== Canvas ====== */
const canvas = $('game'), ctx2d = canvas.getContext('2d');
function fitCanvas(){
  const play = document.querySelector('.play');
  const pw = play.clientWidth - 8, ph = play.clientHeight - 8;
  const ratio = DESIGN_W / DESIGN_H;
  let w = pw, h = pw / ratio;
  if(h > ph){ h = ph; w = ph * ratio; }
  canvas.width = DESIGN_W; canvas.height = DESIGN_H;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
}
window.addEventListener('resize', ()=>{ fitCanvas(); if(state) draw(); });

/* ====== Game state ====== */
let state;
function startGame(){
  fitCanvas();
  const prevLevel = state ? state.level : 1;
  const wasWin = state && state.lastWin === true;
  const newLevel = wasWin ? prevLevel + 1 : 1;
  const streak = parseInt(localStorage.getItem('arcadya_combat_streak')||'0', 10);

  state = {
    level: newLevel,
    streak: wasWin ? streak : 0,
    walls: wallsForLevel(newLevel),
    cfg: levelConfig(newLevel),
    tanks: [
      // Player (blue) at bottom
      { color:'#4a7bff', x: 170, y: 442, angle: -Math.PI/2,
        score:0, fwd:0, lastFire:0, spinning:false, spinUntil:0, isPlayer:true },
      // CPU (red) at top
      { color:'#ff4a6b', x: 170, y: 38, angle:  Math.PI/2,
        score:0, fwd:0, lastFire:0, spinning:false, spinUntil:0, isPlayer:false },
    ],
    bullets: [],
    timeLeft: ROUND_SECONDS,
    status: 'playing',
    statusUntil: 0,
    lastT: performance.now(),
    input: { up:false, down:false, left:false, right:false, fire:false, lastFireT: 0 },
    lastWin: null
  };
  updateHud();
  showBanner('LEVEL ' + newLevel);
  running = true;
  requestAnimationFrame(loop);
}

function updateHud(){
  $('youScore').textContent = state.tanks[0].score;
  $('cpuScore').textContent = state.tanks[1].score;
  $('level').textContent = state.level;
  $('time').textContent = Math.ceil(state.timeLeft);
  $('streak').textContent = state.streak;
}

/* ====== Main loop ====== */
function loop(now){
  if(!running) return;
  const dt = Math.min(48, now - state.lastT);
  state.lastT = now;
  if(!paused) update(dt, now);
  draw();
  requestAnimationFrame(loop);
}

function update(dt, now){
  const s = state;

  if(s.status === 'roundOver'){
    if(now >= s.statusUntil) endRound();
    return;
  }

  // Round timer
  s.timeLeft -= dt/1000;
  if(s.timeLeft <= 0){
    s.timeLeft = 0;
    finishRound('time');
    return;
  }

  // Player input → tank
  const p = s.tanks[0];
  if(!p.spinning){
    if(s.input.left)  p.angle -= TANK_TURN * (dt/16.67);
    if(s.input.right) p.angle += TANK_TURN * (dt/16.67);
    p.fwd = (s.input.up ? 1 : 0) + (s.input.down ? -1 : 0);
    moveTank(p, dt);
  } else {
    spinUpdate(p, dt, now);
  }

  // CPU
  const c = s.tanks[1];
  if(!c.spinning){
    updateCpu(c, dt, now);
    moveTank(c, dt);
  } else {
    spinUpdate(c, dt, now);
  }

  // Player fire (continuous if held, with cooldown + 1 bullet limit)
  if(s.input.fire && !p.spinning){
    tryFire(p, now, 250);
  }

  // Bullets
  for(const b of s.bullets) updateBullet(b, dt);
  s.bullets = s.bullets.filter(b => !b.dead);

  // Check round end by score
  if(p.score >= SCORE_TO_WIN){ finishRound('youWin'); return; }
  if(c.score >= SCORE_TO_WIN){ finishRound('cpuWin'); return; }

  updateHud();
}

function spinUpdate(t, dt, now){
  // Rapid spin during stun
  t.angle += 0.4 * (dt/16.67);
  if(now >= t.spinUntil){
    t.spinning = false;
    // Respawn at a safe spot — out of bullet range OR with a wall blocking
    // line of sight from the opponent. Prevents the "shoot, spin, shoot
    // again" lock-in.
    respawnTank(t);
  }
}

function respawnTank(t){
  const opp = state.tanks.find(x => x !== t);
  const range = state.cfg.range;
  for(let i = 0; i < 80; i++){
    const x = TANK_R + 6 + Math.random() * (DESIGN_W - TANK_R*2 - 12);
    const y = TANK_R + 6 + Math.random() * (DESIGN_H - TANK_R*2 - 12);
    if(tankCollidesAt(x, y, t)) continue;
    const dist = Math.hypot(x - opp.x, y - opp.y);
    const blocked = !lineOfSightAt(x, y, opp.x, opp.y);
    if(dist > range || blocked){
      t.x = x; t.y = y;
      // Face roughly toward the field center so the player isn't disoriented
      t.angle = Math.atan2(DESIGN_H/2 - y, DESIGN_W/2 - x);
      t.fwd = 0;
      return;
    }
  }
  // Fallback: didn't find an ideal spot — just any non-colliding cell
  for(let i = 0; i < 60; i++){
    const x = TANK_R + 6 + Math.random() * (DESIGN_W - TANK_R*2 - 12);
    const y = TANK_R + 6 + Math.random() * (DESIGN_H - TANK_R*2 - 12);
    if(!tankCollidesAt(x, y, t)){
      t.x = x; t.y = y;
      t.angle = Math.atan2(DESIGN_H/2 - y, DESIGN_W/2 - x);
      t.fwd = 0;
      return;
    }
  }
}

function tankCollidesAt(x, y, self){
  for(const w of state.walls){
    if(x + TANK_R > w.x && x - TANK_R < w.x+w.w && y + TANK_R > w.y && y - TANK_R < w.y+w.h) return true;
  }
  for(const tt of state.tanks){
    if(tt === self) continue;
    if(Math.abs(tt.x - x) < TANK_R*2 + 4 && Math.abs(tt.y - y) < TANK_R*2 + 4) return true;
  }
  return false;
}

function lineOfSightAt(ax, ay, bx, by){
  const steps = 28;
  for(let i = 1; i < steps; i++){
    const tt = i/steps;
    const x = ax + (bx - ax) * tt;
    const y = ay + (by - ay) * tt;
    for(const w of state.walls){
      if(x > w.x-1 && x < w.x+w.w+1 && y > w.y-1 && y < w.y+w.h+1) return false;
    }
  }
  return true;
}

function moveTank(t, dt){
  const fwdX = Math.cos(t.angle), fwdY = Math.sin(t.angle);
  const vx = fwdX * t.fwd * TANK_SPEED * (dt/16.67);
  const vy = fwdY * t.fwd * TANK_SPEED * (dt/16.67);
  // Move X
  let nx = t.x + vx;
  if(!tankCollides(nx, t.y, t)) t.x = nx;
  let ny = t.y + vy;
  if(!tankCollides(t.x, ny, t)) t.y = ny;
  // Bounds
  t.x = clamp(t.x, TANK_R+2, DESIGN_W - TANK_R-2);
  t.y = clamp(t.y, TANK_R+2, DESIGN_H - TANK_R-2);
}

function tankCollides(x, y, self){
  for(const w of state.walls){
    if(x + TANK_R > w.x && x - TANK_R < w.x+w.w && y + TANK_R > w.y && y - TANK_R < w.y+w.h) return true;
  }
  for(const t of state.tanks){
    if(t === self) continue;
    if(Math.abs(t.x - x) < TANK_R*2 - 1 && Math.abs(t.y - y) < TANK_R*2 - 1) return true;
  }
  return false;
}

/* ====== CPU AI ====== */
function updateCpu(c, dt, now){
  const p = state.tanks[0];
  const cfg = state.cfg;
  // Aim toward player
  const targetAngle = Math.atan2(p.y - c.y, p.x - c.x);
  let diff = targetAngle - c.angle;
  while(diff >  Math.PI) diff -= 2*Math.PI;
  while(diff < -Math.PI) diff += 2*Math.PI;
  const turn = cfg.cpuTurn * (dt/16.67);
  if(Math.abs(diff) < turn) c.angle = targetAngle;
  else c.angle += Math.sign(diff) * turn;

  // Move forward when roughly facing player & far enough; back off if too close
  const dist = Math.hypot(p.x - c.x, p.y - c.y);
  if(Math.abs(diff) < 0.6 && dist > 70) c.fwd = cfg.cpuSpeed/TANK_SPEED;
  else if(dist < 35) c.fwd = -cfg.cpuSpeed/TANK_SPEED;
  else c.fwd = 0;
  // Random jitter
  if(Math.random() < 0.005){
    c.fwd = (Math.random()<0.5 ? 0 : -cfg.cpuSpeed/TANK_SPEED);
  }

  // Fire if aim is good and line-of-sight clear
  if(Math.abs(diff) < cfg.cpuAimAcc && hasLineOfSight(c, p)){
    tryFire(c, now, cfg.cpuFireCd);
  }
}

function hasLineOfSight(a, b){
  // Sample along segment, check no wall hits
  const steps = 20;
  for(let i=1;i<steps;i++){
    const t = i/steps;
    const x = a.x + (b.x - a.x)*t;
    const y = a.y + (b.y - a.y)*t;
    for(const w of state.walls){
      if(x > w.x-1 && x < w.x+w.w+1 && y > w.y-1 && y < w.y+w.h+1) return false;
    }
  }
  return true;
}

/* ====== Bullets ====== */
function tryFire(t, now, cooldown){
  // One bullet per tank on screen
  if(state.bullets.find(b => b.owner === t && !b.dead)) return;
  if(now - t.lastFire < cooldown) return;
  fireBullet(t);
  t.lastFire = now;
}

function fireBullet(t){
  const off = TANK_R + 4;
  const b = {
    owner: t,
    color: t.color,
    x: t.x + Math.cos(t.angle)*off,
    y: t.y + Math.sin(t.angle)*off,
    vx: Math.cos(t.angle)*BULLET_SPEED,
    vy: Math.sin(t.angle)*BULLET_SPEED,
    bouncesLeft: MAX_BOUNCES,
    dist: 0,
    range: state.cfg.range,
    bornT: performance.now(),
    dead: false
  };
  state.bullets.push(b);
  SFX.fire();
}

function updateBullet(b, dt){
  // Two sub-steps for cleaner wall bouncing
  for(let i=0;i<2;i++){
    const dx = b.vx/2 * (dt/16.67);
    const dy = b.vy/2 * (dt/16.67);
    b.x += dx; b.y += dy;
    b.dist += Math.hypot(dx, dy);
    if(b.dist >= b.range){ b.dead = true; return; }

    // Outer bounds bounce
    if(b.x < BULLET_SIZE/2){ b.x = BULLET_SIZE/2; b.vx = -b.vx; b.bouncesLeft--; SFX.bounce(); }
    if(b.x > DESIGN_W - BULLET_SIZE/2){ b.x = DESIGN_W - BULLET_SIZE/2; b.vx = -b.vx; b.bouncesLeft--; SFX.bounce(); }
    if(b.y < BULLET_SIZE/2){ b.y = BULLET_SIZE/2; b.vy = -b.vy; b.bouncesLeft--; SFX.bounce(); }
    if(b.y > DESIGN_H - BULLET_SIZE/2){ b.y = DESIGN_H - BULLET_SIZE/2; b.vy = -b.vy; b.bouncesLeft--; SFX.bounce(); }

    // Walls — bounce based on the bullet's velocity direction (not nearest
     // edge). This prevents the case where a bullet spawns INSIDE a wall
     // (because the tank is close to it) and gets ejected on the wrong side,
     // appearing to pass through.
    for(const w of state.walls){
      if(b.x > w.x && b.x < w.x+w.w && b.y > w.y && b.y < w.y+w.h){
        const ax = Math.abs(b.vx), ay = Math.abs(b.vy);
        if(ax >= ay){
          // Moving more horizontally — bounce on x axis, eject toward where it came from
          if(b.vx > 0){ b.x = w.x - 0.1; b.vx = -Math.abs(b.vx); }
          else        { b.x = w.x+w.w + 0.1; b.vx = Math.abs(b.vx); }
        } else {
          // Moving more vertically — eject up/down based on direction of travel
          if(b.vy > 0){ b.y = w.y - 0.1; b.vy = -Math.abs(b.vy); }
          else        { b.y = w.y+w.h + 0.1; b.vy = Math.abs(b.vy); }
        }
        b.bouncesLeft--;
        SFX.bounce();
        if(b.bouncesLeft < 0){ b.dead = true; return; }
      }
    }

    if(b.bouncesLeft < 0){ b.dead = true; return; }

    // Tank collisions — but ignore owner (no self-damage; bullet just disappears)
    for(const t of state.tanks){
      if(Math.abs(t.x - b.x) < TANK_R + 1 && Math.abs(t.y - b.y) < TANK_R + 1){
        if(t === b.owner){
          // Self-shot from rebound: silently consume bullet, no penalty
          b.dead = true;
          return;
        }
        if(t.spinning) continue;   // invulnerable during stun
        // Hit!
        t.spinning = true;
        t.spinUntil = performance.now() + 1500;
        b.owner.score++;
        SFX.hit();
        b.dead = true;
        return;
      }
    }
  }
}

/* ====== Round end ====== */
function finishRound(reason){
  const s = state;
  s.status = 'roundOver';
  s.statusUntil = performance.now() + 1100;
  if(reason === 'youWin'){ s.lastWin = true; s.streak++; SFX.win(); }
  else if(reason === 'cpuWin'){ s.lastWin = false; SFX.lose(); }
  else { // time
    if(s.tanks[0].score > s.tanks[1].score){ s.lastWin = true; s.streak++; SFX.win(); }
    else if(s.tanks[1].score > s.tanks[0].score){ s.lastWin = false; SFX.lose(); }
    else { s.lastWin = false; SFX.lose(); }   // tie counts as no advance
  }
  localStorage.setItem('arcadya_combat_streak', s.lastWin ? s.streak : 0);
  // Save high streak
  const hi = parseInt(localStorage.getItem(HS_KEY)||'0',10);
  if(s.streak > hi) localStorage.setItem(HS_KEY, s.streak);
}

function endRound(){
  running = false;
  const s = state;
  const hi = parseInt(localStorage.getItem(HS_KEY)||'0',10);
  $('verdict').textContent = s.lastWin ? 'ניצחת!' : 'הפסדת';
  $('verdict').className = 'verdict ' + (s.lastWin ? 'win' : 'lose');
  $('finalScore').textContent = s.tanks[0].score + ' : ' + s.tanks[1].score;
  $('goNote').textContent = 'רצף ניצחונות: ' + (s.lastWin ? s.streak : 0);
  $('hsNote').innerHTML = (s.lastWin && s.streak >= hi && s.streak > 0) ? '🏆 שיא רצף חדש: ' + s.streak : 'שיא רצף: ' + hi;
  gameOverShown = true;
  setTimeout(()=>$('gameOver').classList.add('active'), 400);
}

function showBanner(text){
  const el = $('levelBanner');
  el.textContent = text;
  el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
  setTimeout(()=> el.classList.remove('show'), 1600);
}

/* ====== Drawing ====== */
function draw(){
  const W = DESIGN_W, H = DESIGN_H;
  // Background
  ctx2d.fillStyle = '#04010e';
  ctx2d.fillRect(0,0,W,H);
  // Grid pattern
  ctx2d.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx2d.lineWidth = 1;
  for(let x=20;x<W;x+=20){ ctx2d.beginPath(); ctx2d.moveTo(x,0); ctx2d.lineTo(x,H); ctx2d.stroke(); }
  for(let y=20;y<H;y+=20){ ctx2d.beginPath(); ctx2d.moveTo(0,y); ctx2d.lineTo(W,y); ctx2d.stroke(); }
  // Borders
  ctx2d.strokeStyle = '#b14bff';
  ctx2d.lineWidth = 2;
  ctx2d.shadowColor = '#b14bff'; ctx2d.shadowBlur = 6;
  ctx2d.strokeRect(1, 1, W-2, H-2);
  ctx2d.shadowBlur = 0;
  // Center divider
  ctx2d.setLineDash([6,6]);
  ctx2d.strokeStyle = 'rgba(177,75,255,0.3)';
  ctx2d.lineWidth = 1;
  ctx2d.beginPath(); ctx2d.moveTo(0, H/2); ctx2d.lineTo(W, H/2); ctx2d.stroke();
  ctx2d.setLineDash([]);

  // Walls
  for(const w of state.walls){
    ctx2d.fillStyle = '#00e6ff';
    ctx2d.shadowColor = '#00e6ff'; ctx2d.shadowBlur = 6;
    ctx2d.fillRect(w.x, w.y, w.w, w.h);
    ctx2d.shadowBlur = 0;
  }

  // Bullets
  for(const b of state.bullets){
    ctx2d.fillStyle = b.color;
    ctx2d.shadowColor = b.color; ctx2d.shadowBlur = 6;
    ctx2d.fillRect(b.x - BULLET_SIZE/2, b.y - BULLET_SIZE/2, BULLET_SIZE, BULLET_SIZE);
    ctx2d.shadowBlur = 0;
  }

  // Tanks
  for(const t of state.tanks){
    drawTank(t);
  }
}

function drawTank(t){
  ctx2d.save();
  ctx2d.translate(t.x, t.y);
  ctx2d.rotate(t.angle);
  // Body
  ctx2d.fillStyle = t.color;
  ctx2d.shadowColor = t.color; ctx2d.shadowBlur = t.spinning ? 14 : 8;
  ctx2d.fillRect(-TANK_R, -TANK_R, TANK_R*2, TANK_R*2);
  // Tracks
  ctx2d.fillStyle = 'rgba(0,0,0,0.4)';
  ctx2d.fillRect(-TANK_R, -TANK_R, TANK_R*2, 3);
  ctx2d.fillRect(-TANK_R,  TANK_R-3, TANK_R*2, 3);
  // Cannon
  ctx2d.fillStyle = '#fff';
  ctx2d.fillRect(0, -2, TANK_R + 6, 4);
  // Turret circle
  ctx2d.fillStyle = t.color;
  ctx2d.beginPath(); ctx2d.arc(0, 0, TANK_R*0.55, 0, Math.PI*2); ctx2d.fill();
  ctx2d.shadowBlur = 0;
  ctx2d.restore();
  // Spinning effect: extra ring
  if(t.spinning){
    ctx2d.strokeStyle = '#fff';
    ctx2d.lineWidth = 1.5;
    ctx2d.beginPath();
    ctx2d.arc(t.x, t.y, TANK_R + 4 + Math.sin(performance.now()/40)*1.5, 0, Math.PI*2);
    ctx2d.stroke();
  }
}

function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

/* ====== Input ====== */
function setMove(dir, on){
  if(!state) return;
  if(dir === 'up')    state.input.up    = on;
  if(dir === 'down')  state.input.down  = on;
  if(dir === 'left')  state.input.left  = on;
  if(dir === 'right') state.input.right = on;
}

document.querySelectorAll('.dpad [data-dir]').forEach(btn => {
  const dir = btn.dataset.dir;
  const down = e => { e.preventDefault(); setMove(dir, true); };
  const up   = e => { e.preventDefault(); setMove(dir, false); };
  btn.addEventListener('touchstart', down, {passive:false});
  btn.addEventListener('touchend',   up,   {passive:false});
  btn.addEventListener('touchcancel',up,   {passive:false});
  btn.addEventListener('mousedown', down);
  btn.addEventListener('mouseup',   up);
  btn.addEventListener('mouseleave',up);
  btn.addEventListener('contextmenu', e => e.preventDefault());
});

document.addEventListener('keydown', e=>{
  if(!state) return;
  if(e.key === 'ArrowUp')    setMove('up', true);
  else if(e.key === 'ArrowDown')  setMove('down', true);
  else if(e.key === 'ArrowLeft')  setMove('left', true);
  else if(e.key === 'ArrowRight') setMove('right', true);
  else if(e.key === ' ')          { e.preventDefault(); state.input.fire = true; }
  else if(e.key === 'p' || e.key === 'P') togglePause();
});
document.addEventListener('keyup', e=>{
  if(!state) return;
  if(e.key === 'ArrowUp')    setMove('up', false);
  if(e.key === 'ArrowDown')  setMove('down', false);
  if(e.key === 'ArrowLeft')  setMove('left', false);
  if(e.key === 'ArrowRight') setMove('right', false);
  if(e.key === ' ')          state.input.fire = false;
});

const actionBtn = $('btnAction');
function actionPress(e){
  if(e) e.preventDefault();
  if(!state) return;
  state.input.fire = true;
  // also fire immediately on press
  if(state.tanks && !state.tanks[0].spinning) tryFire(state.tanks[0], performance.now(), 0);
  actionBtn.style.filter = 'brightness(1.2)';
}
function actionRelease(){
  if(!state) return;
  state.input.fire = false;
  actionBtn.style.filter = '';
}
actionBtn.addEventListener('touchstart', actionPress, {passive:false});
actionBtn.addEventListener('touchend',   e=>{e.preventDefault();actionRelease();}, {passive:false});
actionBtn.addEventListener('touchcancel',e=>{e.preventDefault();actionRelease();}, {passive:false});
actionBtn.addEventListener('mousedown', actionPress);
actionBtn.addEventListener('mouseup',   actionRelease);
actionBtn.addEventListener('mouseleave',actionRelease);
actionBtn.addEventListener('contextmenu', e => e.preventDefault());
</script>
