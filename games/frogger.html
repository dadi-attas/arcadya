<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#05010f" />
<link rel="icon" type="image/svg+xml" href="../assets/icons/icon.svg" />
<link rel="stylesheet" href="../assets/arcadya-shell.css" />
<script src="../assets/arcadya-shell.js"></script>
<title>ARCADYA — FROGGER</title>
<style>
  :root{
    --bg-0:#05010f; --bg-1:#0b0320;
    --neon-pink:#ff2d95; --neon-cyan:#00e6ff; --neon-purple:#b14bff;
    --neon-yellow:#ffe94a; --neon-green:#3dff9a; --neon-orange:#ff8a3d;
    --text:#fff; --muted:#a79ec9; --danger:#ff4a6b;
    --accent:#3dff9a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Heebo",Tahoma,sans-serif;background:var(--bg-0);color:var(--text);overflow:hidden;user-select:none;-webkit-user-select:none;}
  #app{position:relative;width:100vw;height:100vh;height:100dvh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1200px 800px at 50% -10%,rgba(61,255,154,.18),transparent 60%),radial-gradient(900px 600px at 50% 110%,rgba(0,230,255,.15),transparent 60%),linear-gradient(180deg,var(--bg-1) 0%,var(--bg-0) 100%);}
  #stage{position:relative;width:100%;height:100%;max-width:520px;max-height:100%;background:linear-gradient(180deg,#0c0426 0%,#070116 100%);overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.04),0 30px 80px rgba(0,0,0,.6);display:flex;flex-direction:column;}
  @media (min-width:900px){#stage{max-width:440px;max-height:min(900px,95vh);border-radius:28px;border:1px solid rgba(255,255,255,.07);}}

  .hud{position:relative;display:flex;align-items:center;justify-content:space-between;padding:8px 10px;gap:6px;background:linear-gradient(180deg,rgba(255,255,255,.04),transparent);border-bottom:1px solid rgba(255,255,255,.06);z-index:5;}
  .hud-btn{width:36px;height:36px;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .08s;flex:0 0 auto;}
  .hud-btn:active{transform:scale(.92);}
  .hud-btn.exit{color:var(--danger);border-color:rgba(255,74,107,.35);background:rgba(255,74,107,.08);}
  .hud-center{display:flex;gap:10px;align-items:center;flex-wrap:nowrap;}
  .score-group{display:flex;flex-direction:column;align-items:center;line-height:1.1;}
  .label{color:var(--muted);font-size:9px;letter-spacing:2px;}
  .val{font-size:14px;font-weight:800;color:var(--accent);text-shadow:0 0 6px rgba(61,255,154,.55);}
  .val.hi{color:var(--neon-yellow);}
  .val.lv{color:var(--neon-cyan);}
  .lives{display:flex;gap:3px;}
  .lives .f{width:12px;height:12px;border-radius:50%;background:#3dff9a;box-shadow:0 0 6px #3dff9a;}
  .hud-right{display:flex;gap:6px;}

  .play{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#04010e;}
  canvas{display:block;max-width:100%;max-height:100%;}

  .controls{position:relative;border-top:2px solid rgba(255,255,255,.08);background:linear-gradient(180deg,#0a0320,#050110);padding:14px 14px calc(14px + env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:center;min-height:150px;}
  .dpad{position:relative;width:150px;height:150px;justify-self:start;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);}
  .dpad button{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:22px;cursor:pointer;transition:transform .08s,background .1s;
    -webkit-touch-callout:none;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
  .dpad button:active{transform:scale(.9);background:rgba(61,255,154,.3);}
  .d-up{grid-column:2;grid-row:1;border-top-left-radius:10px;border-top-right-radius:10px;}
  .d-down{grid-column:2;grid-row:3;border-bottom-left-radius:10px;border-bottom-right-radius:10px;}
  .d-left{grid-column:3;grid-row:2;border-top-left-radius:10px;border-bottom-left-radius:10px;}
  .d-right{grid-column:1;grid-row:2;border-top-right-radius:10px;border-bottom-right-radius:10px;}
  .d-center{grid-column:2;grid-row:2;background:transparent;border:none;pointer-events:none;}

  .action-wrap{display:flex;align-items:center;justify-content:center;position:relative;flex-direction:column;gap:6px;}
  .action{width:96px;height:96px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#aaffd1,#3dff9a 55%,#117c3e 100%);color:#05010f;font-weight:900;font-size:16px;letter-spacing:2px;border:none;cursor:pointer;box-shadow:0 0 24px rgba(61,255,154,.55),inset 0 -6px 12px rgba(0,0,0,.3);transition:transform .08s;}
  .action:active{transform:scale(.92);}
  .action.disabled{filter:grayscale(.8) brightness(.7);}
  .leap-meter{display:flex;gap:4px;}
  .leap-meter .pip{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(61,255,154,0.3);}
  .leap-meter .pip.on{background:#3dff9a;box-shadow:0 0 6px #3dff9a;}

  .overlay{position:absolute;inset:0;background:rgba(5,1,15,.85);display:none;align-items:center;justify-content:center;z-index:20;animation:fadeIn .15s ease-out;}
  .overlay.active{display:flex;}
  .overlay-box{width:82%;max-width:320px;text-align:center;background:linear-gradient(180deg,#1a0946,#0c0326);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:24px 20px 20px;box-shadow:0 0 40px rgba(61,255,154,.3);}
  .overlay-title{font-size:18px;font-weight:800;margin-bottom:16px;}
  .overlay-actions{display:flex;gap:10px;justify-content:center;}
  .btn{flex:1;padding:12px 0;border-radius:12px;font-size:15px;font-weight:800;border:1px solid transparent;cursor:pointer;transition:transform .08s;}
  .btn:active{transform:scale(.95);}
  .btn-yes{background:linear-gradient(180deg,#3dff9a,#00e6ff);color:#05010f;box-shadow:0 6px 20px rgba(61,255,154,.4);}
  .btn-no{background:rgba(255,255,255,.06);color:#fff;border-color:rgba(255,255,255,.15);}
  .pause-label{position:absolute;inset:0;display:none;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:800;letter-spacing:3px;background:rgba(5,1,15,.55);z-index:15;text-shadow:0 0 10px var(--neon-cyan);}
  .pause-label.active{display:flex;}

  .stage-banner{position:absolute;top:30%;left:0;right:0;text-align:center;font-size:26px;font-weight:900;letter-spacing:6px;color:#fff;text-shadow:0 0 14px var(--accent);display:none;z-index:4;pointer-events:none;}
  .stage-banner.show{display:block;animation:banner 1.8s forwards;}
  @keyframes banner{0%{opacity:0;transform:scale(.7);}20%{opacity:1;transform:scale(1);}80%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(1.1);}}

  .opener{position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,#1a0550 0%,#05010f 80%);display:flex;align-items:center;justify-content:center;z-index:30;animation:openerFade 4s forwards;}
  .opener .gm-name{font-size:clamp(44px,13vw,72px);font-weight:900;letter-spacing:6px;color:#fff;text-shadow:0 0 8px #fff,0 0 18px var(--accent),0 0 36px var(--accent),0 0 60px var(--neon-cyan);animation:openerPulse 1s infinite alternate;}
  @keyframes openerFade{0%{opacity:1;}80%{opacity:1;}100%{opacity:0;visibility:hidden;}}
  @keyframes openerPulse{from{transform:scale(.95);}to{transform:scale(1.05);}}

  .gameover-box .big-score{font-size:44px;font-weight:900;color:var(--accent);text-shadow:0 0 18px var(--accent);margin:6px 0;}
  .gameover-box .note{color:var(--neon-cyan);font-size:13px;letter-spacing:2px;margin-bottom:4px;}
  .gameover-box .hs-note{color:var(--neon-yellow);font-size:13px;letter-spacing:2px;margin-bottom:14px;min-height:18px;}
  .gameover-box .go-actions{display:flex;gap:10px;margin-top:4px;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>
<body>
<div id="app"><div id="stage">
  <div class="hud">
    <button id="btnExit" class="hud-btn exit" aria-label="יציאה">✕</button>
    <div class="hud-center">
      <div class="score-group"><div class="label">SCORE</div><div id="score" class="val">0</div></div>
      <div class="score-group"><div class="label">HI</div><div id="hiscore" class="val hi">0</div></div>
      <div class="score-group"><div class="label">LVL</div><div id="level" class="val lv">1</div></div>
      <div class="score-group"><div class="label">LIVES</div><div id="lives" class="lives"></div></div>
    </div>
    <div class="hud-right">
      <button id="btnSound" class="hud-btn" aria-label="סאונד">🔊</button>
      <button id="btnPause" class="hud-btn" aria-label="פאוז">⏸</button>
    </div>
  </div>

  <div class="play">
    <canvas id="game"></canvas>
    <div id="stageBanner" class="stage-banner">STAGE 1</div>
    <div id="pauseLabel" class="pause-label">המשחק מושהה</div>
  </div>

  <div class="controls">
    <div class="dpad">
      <button class="d-up"    data-dir="up">▲</button>
      <button class="d-right" data-dir="right">▶</button>
      <button class="d-center" tabindex="-1"></button>
      <button class="d-left"  data-dir="left">◀</button>
      <button class="d-down"  data-dir="down">▼</button>
    </div>
    <div class="action-wrap">
      <button id="btnAction" class="action">LEAP</button>
      <div id="leapMeter" class="leap-meter"><div class="pip on"></div><div class="pip on"></div><div class="pip on"></div></div>
    </div>
  </div>

  <div id="opener" class="opener"><div class="gm-name">FROGGER</div></div>

  <div id="exitModal" class="overlay">
    <div class="overlay-box">
      <div class="overlay-title">לצאת מהמשחק?</div>
      <div class="overlay-actions">
        <button id="exitYes" class="btn btn-yes">כן</button>
        <button id="exitNo"  class="btn btn-no">לא</button>
      </div>
    </div>
  </div>

  <div id="gameOver" class="overlay">
    <div class="overlay-box gameover-box">
      <div class="overlay-title">סיום משחק</div>
      <div id="finalScore" class="big-score">0</div>
      <div id="goNote" class="note">&nbsp;</div>
      <div id="hsNote" class="hs-note">&nbsp;</div>
      <div class="go-actions">
        <button id="playAgain" class="btn btn-yes">שחק שוב</button>
        <button id="backHome"  class="btn btn-no">חזרה ל־ARCADYA</button>
      </div>
    </div>
  </div>
</div></div>

<script>
const SFX = ARCADYA.makeSFX({
  hop:   beep => beep(720,0.05,'triangle',0.08),
  leap:  beep => { beep(520,0.06,'triangle',0.1); setTimeout(()=>beep(840,0.07,'triangle',0.1),50); },
  home:  beep => { beep(660,0.08,'triangle',0.12); setTimeout(()=>beep(990,0.09,'triangle',0.12),80); setTimeout(()=>beep(1320,0.12,'triangle',0.12),170); },
  die:   beep => { beep(220,0.25,'sawtooth',0.16); setTimeout(()=>beep(110,0.4,'sawtooth',0.14),200); },
  clear: beep => { beep(440,0.1,'triangle',0.12); setTimeout(()=>beep(660,0.1,'triangle',0.12),100); setTimeout(()=>beep(880,0.1,'triangle',0.12),200); setTimeout(()=>beep(1320,0.18,'triangle',0.12),300); }
});

/* ====== Shell ====== */
const HS_KEY = 'arcadya_frogger_high_score';
const $ = id => document.getElementById(id);
let paused=false, gameOverShown=false, running=false;

SFX.open();
setTimeout(()=>{ $('opener').style.display='none'; startGame(); }, 4000);

function refreshSoundBtn(){ $('btnSound').textContent = SFX.isMuted() ? '🔇' : '🔊'; }
refreshSoundBtn();
$('btnSound').addEventListener('click', ()=>{ SFX.toggle(); refreshSoundBtn(); SFX.click(); });

$('btnPause').addEventListener('click', togglePause);
function togglePause(){
  if(gameOverShown) return;
  paused = !paused;
  $('btnPause').textContent = paused ? '▶' : '⏸';
  $('pauseLabel').classList.toggle('active', paused);
  SFX.click();
}

$('btnExit').addEventListener('click', ()=>{ SFX.click(); $('exitModal').classList.add('active'); if(!paused) togglePause(); });
$('exitNo').addEventListener('click', ()=>{ SFX.click(); $('exitModal').classList.remove('active'); if(paused) togglePause(); });
$('exitYes').addEventListener('click', ()=>{ window.location.href = '../index.html?home=1'; });

$('playAgain').addEventListener('click', ()=>{ SFX.click(); $('gameOver').classList.remove('active'); gameOverShown = false; startGame(); });
$('backHome').addEventListener('click',  ()=>{ window.location.href = '../index.html?home=1'; });

/* ====== Board ====== */
const COLS = 11;
const ROWS = 14;
const CELL = 30;
const DESIGN_W = COLS * CELL;       // 330
const DESIGN_H = ROWS * CELL + 12;  // extra for time bar
const TIME_BAR_H = 10;

// Row layout (top to bottom):
// 0:  HOME row (5 homes + 6 walls)
// 1-5: RIVER lanes
// 6:  MEDIAN (safe grass)
// 7-11: ROAD lanes
// 12: START grass
// 13: reserved (visual padding, same as row 12)

const ROW_START = 12;
const HOME_ROW  = 0;
const MEDIAN_ROW = 6;
const HOMES_COLS = [1,3,5,7,9];   // 5 home slots

/* ====== Canvas ====== */
const canvas = $('game'), ctx2d = canvas.getContext('2d');
function fitCanvas(){
  const play = document.querySelector('.play');
  const pw = play.clientWidth - 8, ph = play.clientHeight - 8;
  const ratio = DESIGN_W / DESIGN_H;
  let w = pw, h = pw / ratio;
  if(h > ph){ h = ph; w = ph * ratio; }
  canvas.width = DESIGN_W; canvas.height = DESIGN_H;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
}
window.addEventListener('resize', ()=>{ fitCanvas(); if(state) draw(); });

/* ====== Game state ====== */
let state;
function startGame(){
  fitCanvas();
  state = {
    stage: 1,
    score: 0,
    hi: parseInt(localStorage.getItem(HS_KEY)||'0',10),
    lives: 3,
    homes: [false,false,false,false,false],
    lanes: [],
    frog: newFrog(),
    leaps: 3,
    time: 60,             // seconds per attempt
    lastT: performance.now(),
    status: 'playing',    // playing | dying | stageClear | over
    statusUntil: 0,
    maxReachedRow: ROW_START
  };
  buildLanes(state.stage);
  updateHud();
  showBanner('STAGE 1');
  running = true;
  requestAnimationFrame(loop);
}

function newFrog(){
  return {
    gx: Math.floor(COLS/2),       // col 5
    gy: ROW_START,
    x: (Math.floor(COLS/2)) * CELL + CELL/2,
    y: ROW_START * CELL + CELL/2,
    hop: null,                     // {sx, sy, ex, ey, t, dur, dir}
    facing: 'up',
    onPlatform: null
  };
}

function buildLanes(stage){
  const s = state;
  const sp = Math.min(2.6, 0.8 + (stage-1)*0.22);  // base speed scale (cells/sec)
  // ROAD lanes (rows 7–11, closer rows are near start)
  // Row 11 bottom near grass — slow/single car
  // Row  7 top near median — fastest (truck)
  s.lanes = [];
  s.lanes.push(makeRoadLane(11, +1, 0.8*sp, [{w:1}], 5));    // slow right
  s.lanes.push(makeRoadLane(10, -1, 1.0*sp, [{w:1},{w:1}], 4));
  s.lanes.push(makeRoadLane( 9, +1, 1.3*sp, [{w:1}], 5));
  s.lanes.push(makeRoadLane( 8, -1, 1.6*sp, [{w:1},{w:1}], 4));
  s.lanes.push(makeRoadLane( 7, +1, 2.0*sp, [{w:2}], 6));    // big truck
  // RIVER lanes (rows 1–5)
  // Row 5 bottom near median, Row 1 top near homes
  s.lanes.push(makeRiverLane(5, +1, 1.0*sp, 'log', 3, 4));
  s.lanes.push(makeRiverLane(4, -1, 1.2*sp, 'turtle', 3, 4));
  s.lanes.push(makeRiverLane(3, +1, 1.5*sp, 'log', 4, 5));
  s.lanes.push(makeRiverLane(2, -1, 1.3*sp, 'log', 2, 4));
  s.lanes.push(makeRiverLane(1, +1, 1.7*sp, 'turtle', 2, 3));
}

function makeRoadLane(row, dir, speed, shapes, spacing){
  // shapes: array of vehicle sizes (cells wide); repeat to fill, spaced by `spacing` cells
  const items = [];
  let x = -2;
  let i = 0;
  while(x < COLS + 6){
    const w = shapes[i % shapes.length].w;
    items.push({ x: x, w, kind: w >= 2 ? 'truck' : 'car' });
    x += w + spacing;
    i++;
  }
  return { row, type:'road', dir, speed, items };
}

function makeRiverLane(row, dir, speed, kind, width, spacing){
  const items = [];
  let x = -2;
  while(x < COLS + 6){
    items.push({ x: x, w: width, kind, phase: Math.random()*Math.PI*2 });
    x += width + spacing;
  }
  return { row, type:'river', dir, speed, items };
}

function updateHud(){
  $('score').textContent = state.score;
  $('hiscore').textContent = Math.max(state.hi, state.score);
  $('level').textContent = state.stage;
  const lv = $('lives'); lv.innerHTML = '';
  for(let i=0;i<state.lives;i++){ const d=document.createElement('div'); d.className='f'; lv.appendChild(d); }
  const lm = $('leapMeter'); lm.innerHTML = '';
  for(let i=0;i<3;i++){ const p=document.createElement('div'); p.className='pip' + (i<state.leaps?' on':''); lm.appendChild(p); }
  $('btnAction').classList.toggle('disabled', state.leaps <= 0);
}

/* ====== Main loop ====== */
function loop(now){
  if(!running) return;
  const dt = Math.min(48, now - state.lastT);
  state.lastT = now;
  if(!paused) update(dt, now);
  draw();
  requestAnimationFrame(loop);
}

function update(dt, now){
  const s = state;

  if(s.status === 'dying'){
    if(now >= s.statusUntil){
      if(s.lives <= 0){ endGame(); return; }
      respawnFrog();
    }
    return;
  }
  if(s.status === 'stageClear'){
    if(now >= s.statusUntil) startNextStage();
    return;
  }

  // Timer
  s.time -= dt/1000;
  if(s.time <= 0){ die('זמן'); return; }

  // Lanes move
  for(const lane of s.lanes){
    const dx = lane.dir * lane.speed * (dt/1000);
    for(const it of lane.items){
      it.x += dx;
      // wrap
      if(lane.dir > 0 && it.x > COLS + 2) it.x = -it.w - 1;
      if(lane.dir < 0 && it.x + it.w < -2) it.x = COLS + 1;
    }
  }

  // Frog hop animation
  if(s.frog.hop){
    s.frog.hop.t += dt;
    const T = Math.min(1, s.frog.hop.t / s.frog.hop.dur);
    s.frog.x = lerp(s.frog.hop.sx, s.frog.hop.ex, T);
    s.frog.y = lerp(s.frog.hop.sy, s.frog.hop.ey, T);
    if(T >= 1){
      s.frog.gx = Math.round((s.frog.hop.ex - CELL/2) / CELL);
      s.frog.gy = Math.round((s.frog.hop.ey - CELL/2) / CELL);
      s.frog.hop = null;
      onLand();
    }
  } else {
    // If on platform, drift with it
    if(s.frog.onPlatform){
      const lane = s.frog.onPlatform.lane;
      const plat = s.frog.onPlatform.plat;
      s.frog.x += lane.dir * lane.speed * (dt/1000) * CELL;
      s.frog.gx = Math.round((s.frog.x - CELL/2) / CELL);
      // off screen
      if(s.frog.x < -CELL/2 || s.frog.x > DESIGN_W + CELL/2){
        die('נסחפת');
        return;
      }
    }
    // Continuous collision check if not hopping
    checkHazards();
  }
}

function lerp(a,b,t){ return a + (b-a)*t; }

function onLand(){
  const s = state;
  // Score progress (+10 per new highest forward row)
  if(s.frog.gy < s.maxReachedRow){
    s.score += 10 * (s.maxReachedRow - s.frog.gy);
    s.maxReachedRow = s.frog.gy;
    updateHud();
  }
  // Home?
  if(s.frog.gy === HOME_ROW){
    const homeIdx = HOMES_COLS.indexOf(s.frog.gx);
    if(homeIdx === -1 || s.homes[homeIdx]){
      die('בית תפוס');
      return;
    }
    s.homes[homeIdx] = true;
    const timeBonus = Math.floor(s.time) * 10;
    s.score += 50 + timeBonus;
    SFX.home();
    updateHud();
    if(s.homes.every(h => h)){
      // stage clear
      s.score += 1000;
      updateHud();
      s.status = 'stageClear';
      s.statusUntil = performance.now() + 1600;
      SFX.clear();
      showBanner('CLEAR!');
      return;
    } else {
      respawnFrog(true);  // keep lives, reset time
    }
    return;
  }
  // evaluate hazards at landing spot
  checkHazards(true);
}

function checkHazards(fromLanding){
  const s = state;
  if(s.status !== 'playing') return;
  const row = s.frog.gy;
  // Safe rows
  if(row === ROW_START || row === MEDIAN_ROW || row >= ROWS) return;
  if(row === HOME_ROW) return; // handled in onLand

  const lane = s.lanes.find(l => l.row === row);
  if(!lane) return;

  if(lane.type === 'road'){
    // Any vehicle overlapping frog.gx?
    for(const it of lane.items){
      const left = it.x, right = it.x + it.w;
      if(s.frog.gx + 0.35 > left && s.frog.gx + 0.65 < right){
        die('מכונית');
        return;
      }
    }
    s.frog.onPlatform = null;
  } else if(lane.type === 'river'){
    // must be on a platform
    let found = null;
    for(const it of lane.items){
      const left = it.x, right = it.x + it.w;
      // check frog pixel x for precise alignment
      const fx = s.frog.x / CELL;    // frog center in cells
      if(fx > left && fx < right){ found = it; break; }
    }
    if(!found){
      die('טביעה');
      return;
    }
    s.frog.onPlatform = { lane, plat: found };
  }
}

function respawnFrog(keepTime){
  const s = state;
  s.frog = newFrog();
  if(!keepTime) s.time = 60;
  s.maxReachedRow = ROW_START;
  s.status = 'playing';
}

function die(reason){
  const s = state;
  if(s.status !== 'playing') return;
  s.status = 'dying';
  s.statusUntil = performance.now() + 1100;
  s.lives--;
  s.frog.onPlatform = null;
  s.frog.hop = null;
  SFX.die();
  updateHud();
}

function startNextStage(){
  const s = state;
  s.stage++;
  s.homes = [false,false,false,false,false];
  s.leaps = 3;
  s.time = 60;
  s.maxReachedRow = ROW_START;
  buildLanes(s.stage);
  s.frog = newFrog();
  s.status = 'playing';
  updateHud();
  showBanner('STAGE ' + s.stage);
}

function endGame(){
  running = false;
  const s = state;
  const prev = parseInt(localStorage.getItem(HS_KEY)||'0',10);
  if(s.score > prev) localStorage.setItem(HS_KEY, s.score);
  $('finalScore').textContent = s.score;
  $('goNote').textContent = 'שלב ' + s.stage;
  $('hsNote').innerHTML = (s.score > prev && s.score > 0) ? '🏆 שיא חדש!' : 'שיא: ' + prev;
  gameOverShown = true;
  setTimeout(()=>$('gameOver').classList.add('active'), 500);
}

function showBanner(text){
  const el = $('stageBanner');
  el.textContent = text;
  el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
  setTimeout(()=> el.classList.remove('show'), 1800);
}

/* ====== Drawing ====== */
function draw(){
  const W = DESIGN_W, H = DESIGN_H;
  ctx2d.fillStyle = '#04010e';
  ctx2d.fillRect(0,0,W,H);

  // Row backgrounds
  for(let r=0;r<ROWS;r++){
    const y = r*CELL;
    if(r === HOME_ROW){
      ctx2d.fillStyle = '#0d2a12';  // top wall
      ctx2d.fillRect(0, y, W, CELL);
    } else if(r >= 1 && r <= 5){
      ctx2d.fillStyle = '#0a1a3a';  // river
      ctx2d.fillRect(0, y, W, CELL);
      // ripples
      ctx2d.fillStyle = 'rgba(0,230,255,0.05)';
      for(let i=0;i<6;i++) ctx2d.fillRect(((i*53 + performance.now()/60)%W), y + 6 + (i%2)*10, 12, 2);
    } else if(r === MEDIAN_ROW){
      ctx2d.fillStyle = '#1a5a2a';
      ctx2d.fillRect(0, y, W, CELL);
    } else if(r >= 7 && r <= 11){
      ctx2d.fillStyle = '#1a1a22';  // road
      ctx2d.fillRect(0, y, W, CELL);
      // lane dashes
      ctx2d.fillStyle = 'rgba(255,255,255,0.25)';
      for(let x=4;x<W;x+=22){ ctx2d.fillRect(x, y + CELL-1, 12, 1); }
    } else {
      ctx2d.fillStyle = '#1a5a2a';  // grass
      ctx2d.fillRect(0, y, W, CELL);
    }
  }

  // Homes row: walls between homes
  const homeY = HOME_ROW*CELL;
  ctx2d.fillStyle = '#05010e';
  for(let c=0;c<COLS;c++){
    if(!HOMES_COLS.includes(c)){
      ctx2d.fillRect(c*CELL, homeY, CELL, CELL);
    }
  }
  // home slots
  for(let i=0;i<HOMES_COLS.length;i++){
    const c = HOMES_COLS[i];
    const x = c*CELL, y = homeY;
    ctx2d.strokeStyle = 'rgba(61,255,154,0.7)';
    ctx2d.lineWidth = 2;
    ctx2d.strokeRect(x+3, y+3, CELL-6, CELL-6);
    if(state.homes[i]){
      drawFrogIcon(x+CELL/2, y+CELL/2, CELL*0.6, '#3dff9a', 'up');
    }
  }

  // Lanes items
  for(const lane of state.lanes){
    const y = lane.row * CELL;
    for(const it of lane.items){
      if(lane.type === 'road') drawVehicle(it, y, lane.dir);
      else drawPlatform(it, y, lane.dir);
    }
  }

  // Frog
  if(state.status === 'playing' || state.status === 'dying'){
    const f = state.frog;
    if(state.status === 'dying'){
      const t = (state.statusUntil - performance.now()) / 1100;
      const flash = Math.floor(performance.now()/80)%2 === 0;
      if(flash) drawFrogIcon(f.x, f.y, CELL*0.7*(0.6 + t*0.4), '#ff4a6b', f.facing);
    } else {
      drawFrogIcon(f.x, f.y, CELL*0.7, '#3dff9a', f.facing);
    }
  }

  // Time bar
  const timeBarY = DESIGN_H - TIME_BAR_H - 1;
  ctx2d.fillStyle = '#1a1a22';
  ctx2d.fillRect(0, timeBarY, W, TIME_BAR_H);
  const tFrac = Math.max(0, state.time/60);
  const col = tFrac > 0.5 ? '#3dff9a' : (tFrac > 0.25 ? '#ffe94a' : '#ff4a6b');
  ctx2d.fillStyle = col;
  ctx2d.fillRect(0, timeBarY, W*tFrac, TIME_BAR_H);
  ctx2d.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx2d.strokeRect(0, timeBarY+0.5, W, TIME_BAR_H-1);
}

function drawVehicle(it, y, dir){
  const x = it.x * CELL;
  const w = it.w * CELL;
  const color = it.kind === 'truck' ? '#ffe94a' : '#ff4a6b';
  ctx2d.fillStyle = color;
  ctx2d.shadowColor = color; ctx2d.shadowBlur = 8;
  roundRect(ctx2d, x+2, y+4, w-4, CELL-8, 4);
  ctx2d.fill();
  ctx2d.shadowBlur = 0;
  // windows / headlights
  ctx2d.fillStyle = 'rgba(0,0,0,0.6)';
  ctx2d.fillRect(x+4, y+8, 4, CELL-16);
  ctx2d.fillRect(x+w-8, y+8, 4, CELL-16);
  ctx2d.fillStyle = '#fff';
  const lx = dir > 0 ? x+w-4 : x+2;
  ctx2d.fillRect(lx, y + CELL/2-2, 2, 4);
}

function drawPlatform(it, y, dir){
  const x = it.x * CELL;
  const w = it.w * CELL;
  if(it.kind === 'log'){
    ctx2d.fillStyle = '#8a4a1f';
    roundRect(ctx2d, x+2, y+5, w-4, CELL-10, 6);
    ctx2d.fill();
    ctx2d.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx2d.lineWidth = 1;
    for(let i=1;i<it.w;i++){
      ctx2d.beginPath();
      ctx2d.moveTo(x + i*CELL, y+6);
      ctx2d.lineTo(x + i*CELL, y+CELL-6);
      ctx2d.stroke();
    }
  } else {
    // turtles: draw it.w turtle heads
    for(let i=0;i<it.w;i++){
      const cx = x + i*CELL + CELL/2;
      const cy = y + CELL/2;
      ctx2d.fillStyle = '#3dff9a';
      ctx2d.beginPath(); ctx2d.arc(cx, cy, CELL*0.4, 0, Math.PI*2); ctx2d.fill();
      ctx2d.fillStyle = '#0d2a12';
      ctx2d.beginPath(); ctx2d.arc(cx, cy, CELL*0.22, 0, Math.PI*2); ctx2d.fill();
    }
  }
}

function drawFrogIcon(cx, cy, size, color, facing){
  const s = size;
  ctx2d.save();
  ctx2d.translate(cx, cy);
  const rotMap = { up:0, right:Math.PI/2, down:Math.PI, left:-Math.PI/2 };
  ctx2d.rotate(rotMap[facing] || 0);
  // body
  ctx2d.fillStyle = color;
  ctx2d.shadowColor = color; ctx2d.shadowBlur = 10;
  ctx2d.beginPath();
  ctx2d.ellipse(0, 0, s*0.4, s*0.45, 0, 0, Math.PI*2);
  ctx2d.fill();
  ctx2d.shadowBlur = 0;
  // legs
  ctx2d.fillStyle = color;
  ctx2d.fillRect(-s*0.45, -s*0.1, s*0.2, s*0.2);
  ctx2d.fillRect( s*0.25, -s*0.1, s*0.2, s*0.2);
  ctx2d.fillRect(-s*0.4,  s*0.25, s*0.2, s*0.2);
  ctx2d.fillRect( s*0.2,  s*0.25, s*0.2, s*0.2);
  // eyes
  ctx2d.fillStyle = '#fff';
  ctx2d.beginPath(); ctx2d.arc(-s*0.12, -s*0.24, s*0.09, 0, Math.PI*2); ctx2d.fill();
  ctx2d.beginPath(); ctx2d.arc( s*0.12, -s*0.24, s*0.09, 0, Math.PI*2); ctx2d.fill();
  ctx2d.fillStyle = '#000';
  ctx2d.beginPath(); ctx2d.arc(-s*0.12, -s*0.24, s*0.04, 0, Math.PI*2); ctx2d.fill();
  ctx2d.beginPath(); ctx2d.arc( s*0.12, -s*0.24, s*0.04, 0, Math.PI*2); ctx2d.fill();
  ctx2d.restore();
}

function roundRect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y); c.closePath();
}

/* ====== Input ====== */
function startHop(dir, cells){
  if(!state || state.status !== 'playing') return;
  const f = state.frog;
  if(f.hop) return;   // can't hop mid-hop
  const dmap = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
  const d = dmap[dir]; if(!d) return;
  const nx = f.gx + d[0]*cells;
  const ny = f.gy + d[1]*cells;
  if(nx < 0 || nx >= COLS) return;
  if(ny < 0 || ny > ROW_START) return;
  const sx = f.x, sy = f.y;
  const ex = nx*CELL + CELL/2;
  const ey = ny*CELL + CELL/2;
  f.hop = { sx, sy, ex, ey, t:0, dur: cells > 1 ? 220 : 140 };
  f.facing = dir;
  f.onPlatform = null;
  if(cells > 1) SFX.leap(); else SFX.hop();
}

document.querySelectorAll('.dpad [data-dir]').forEach(btn => {
  const dir = btn.dataset.dir;
  const press = e => { e.preventDefault(); startHop(dir, 1); };
  btn.addEventListener('touchstart', press, {passive:false});
  btn.addEventListener('click', () => startHop(dir, 1));
  btn.addEventListener('contextmenu', e => e.preventDefault());
});

document.addEventListener('keydown', e=>{
  if(!state) return;
  if(e.key === 'ArrowUp')    startHop('up', 1);
  else if(e.key === 'ArrowDown')  startHop('down', 1);
  else if(e.key === 'ArrowLeft')  startHop('left', 1);
  else if(e.key === 'ArrowRight') startHop('right', 1);
  else if(e.key === ' ')          { e.preventDefault(); doLeap(); }
  else if(e.key === 'p' || e.key === 'P') togglePause();
});

const actionBtn = $('btnAction');
function doLeap(){
  if(!state || state.status !== 'playing') return;
  if(state.leaps <= 0) return;
  state.leaps--;
  updateHud();
  startHop('up', 2);
}
function actionPress(e){ if(e) e.preventDefault(); doLeap(); actionBtn.style.filter='brightness(1.2)'; }
function actionRelease(){ actionBtn.style.filter=''; }
actionBtn.addEventListener('touchstart', actionPress, {passive:false});
actionBtn.addEventListener('touchend',   e=>{e.preventDefault();actionRelease();}, {passive:false});
actionBtn.addEventListener('mousedown', actionPress);
actionBtn.addEventListener('mouseup',   actionRelease);
actionBtn.addEventListener('mouseleave',actionRelease);
actionBtn.addEventListener('contextmenu', e => e.preventDefault());
</script>
