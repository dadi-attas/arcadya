<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#05010f" />
<link rel="icon" type="image/svg+xml" href="../assets/icons/icon.svg" />
<link rel="stylesheet" href="../assets/arcadya-shell.css" />
<script src="../assets/arcadya-shell.js"></script>
<title>ARCADYA — PAC-MAN</title>
<style>
  :root{
    --bg-0:#05010f; --bg-1:#0b0320;
    --neon-pink:#ff2d95; --neon-cyan:#00e6ff; --neon-purple:#b14bff;
    --neon-yellow:#ffe94a; --neon-green:#3dff9a; --neon-orange:#ff8a3d;
    --text:#fff; --muted:#a79ec9; --danger:#ff4a6b;
    --accent:#ffe94a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Heebo",Tahoma,sans-serif;background:var(--bg-0);color:var(--text);overflow:hidden;user-select:none;-webkit-user-select:none;}
  #app{position:relative;width:100vw;height:100vh;height:100dvh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1200px 800px at 50% -10%,rgba(255,233,74,.15),transparent 60%),radial-gradient(900px 600px at 50% 110%,rgba(177,75,255,.18),transparent 60%),linear-gradient(180deg,var(--bg-1) 0%,var(--bg-0) 100%);}
  #stage{position:relative;width:100%;height:100%;max-width:520px;max-height:100%;background:linear-gradient(180deg,#0c0426 0%,#070116 100%);overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.04),0 30px 80px rgba(0,0,0,.6);display:flex;flex-direction:column;}
  @media (min-width:900px){#stage{max-width:440px;max-height:min(900px,95vh);border-radius:28px;border:1px solid rgba(255,255,255,.07);}}

  .hud{position:relative;display:flex;align-items:center;justify-content:space-between;padding:10px 12px;gap:6px;background:linear-gradient(180deg,rgba(255,255,255,.04),transparent);border-bottom:1px solid rgba(255,255,255,.06);z-index:5;}
  .hud-btn{width:38px;height:38px;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .08s;}
  .hud-btn:active{transform:scale(.92);}
  .hud-btn.exit{color:var(--danger);border-color:rgba(255,74,107,.35);background:rgba(255,74,107,.08);}
  .hud-center{display:flex;gap:12px;align-items:center;}
  .score-group{display:flex;flex-direction:column;align-items:center;line-height:1.1;}
  .label{color:var(--muted);font-size:9px;letter-spacing:2px;}
  .val{font-size:16px;font-weight:800;color:var(--accent);text-shadow:0 0 8px rgba(255,233,74,.6);}
  .val.hi{color:var(--neon-yellow);}
  .lives{display:flex;gap:3px;}
  .lives .pac{width:12px;height:12px;border-radius:50%;background:#ffe94a;box-shadow:0 0 6px #ffe94a;position:relative;}
  .lives .pac::after{content:'';position:absolute;right:0;top:50%;width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-right:7px solid #05010f;transform:translateY(-50%);}
  .hud-right{display:flex;gap:6px;}

  .play{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#04010e;}
  canvas{display:block;max-width:100%;max-height:100%;}

  .controls{position:relative;border-top:2px solid rgba(255,255,255,.08);background:linear-gradient(180deg,#0a0320,#050110);padding:14px 14px calc(14px + env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:center;min-height:150px;}
  .dpad{position:relative;width:150px;height:150px;justify-self:start;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);}
  .dpad button{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:22px;cursor:pointer;transition:transform .08s,background .1s;
    -webkit-touch-callout:none;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
  .dpad button:active{transform:scale(.9);background:rgba(255,233,74,.25);}
  .d-up{grid-column:2;grid-row:1;border-top-left-radius:10px;border-top-right-radius:10px;}
  .d-down{grid-column:2;grid-row:3;border-bottom-left-radius:10px;border-bottom-right-radius:10px;}
  .d-left{grid-column:3;grid-row:2;border-top-left-radius:10px;border-bottom-left-radius:10px;}
  .d-right{grid-column:1;grid-row:2;border-top-right-radius:10px;border-bottom-right-radius:10px;}
  .d-center{grid-column:2;grid-row:2;background:transparent;border:none;pointer-events:none;}

  .action-wrap{display:flex;align-items:center;justify-content:center;position:relative;}
  .action{width:96px;height:96px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff68a,#ffc53d 55%,#9c6a00 100%);color:#2a1600;font-weight:900;font-size:14px;letter-spacing:2px;border:none;cursor:pointer;box-shadow:0 0 24px rgba(255,197,61,.55),inset 0 -6px 12px rgba(0,0,0,.3);transition:transform .08s;}
  .action:active{transform:scale(.92);}
  .action.cooldown{filter:grayscale(.8) brightness(.7);}
  .turbo-ring{position:absolute;inset:-4px;width:104px;height:104px;border-radius:50%;pointer-events:none;}

  .overlay{position:absolute;inset:0;background:rgba(5,1,15,.85);display:none;align-items:center;justify-content:center;z-index:20;animation:fadeIn .15s ease-out;}
  .overlay.active{display:flex;}
  .overlay-box{width:82%;max-width:320px;text-align:center;background:linear-gradient(180deg,#1a0946,#0c0326);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:24px 20px 20px;box-shadow:0 0 40px rgba(255,233,74,.25);}
  .overlay-title{font-size:18px;font-weight:800;margin-bottom:16px;}
  .overlay-actions{display:flex;gap:10px;justify-content:center;}
  .btn{flex:1;padding:12px 0;border-radius:12px;font-size:15px;font-weight:800;border:1px solid transparent;cursor:pointer;transition:transform .08s;}
  .btn:active{transform:scale(.95);}
  .btn-yes{background:linear-gradient(180deg,#ffe94a,#ff8a3d);color:#2a1600;box-shadow:0 6px 20px rgba(255,197,61,.4);}
  .btn-no{background:rgba(255,255,255,.06);color:#fff;border-color:rgba(255,255,255,.15);}
  .pause-label{position:absolute;inset:0;display:none;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:800;letter-spacing:3px;background:rgba(5,1,15,.55);z-index:15;text-shadow:0 0 10px var(--neon-cyan);}
  .pause-label.active{display:flex;}

  .ready-banner{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:14;font-size:22px;font-weight:900;letter-spacing:6px;color:var(--neon-yellow);text-shadow:0 0 12px var(--neon-yellow);pointer-events:none;}
  .ready-banner.show{display:flex;animation:readyBlink 1s infinite;}
  @keyframes readyBlink{0%,100%{opacity:1;}50%{opacity:.4;}}

  .opener{position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,#1a0550 0%,#05010f 80%);display:flex;align-items:center;justify-content:center;z-index:30;animation:openerFade 4s forwards;}
  .opener .gm-name{font-size:clamp(40px,12vw,62px);font-weight:900;letter-spacing:6px;color:#fff;text-shadow:0 0 8px #fff,0 0 18px var(--accent),0 0 36px var(--accent),0 0 60px var(--neon-orange);animation:openerPulse 1s infinite alternate;}
  @keyframes openerFade{0%{opacity:1;}80%{opacity:1;}100%{opacity:0;visibility:hidden;}}
  @keyframes openerPulse{from{transform:scale(.95);}to{transform:scale(1.05);}}

  .gameover-box .big-score{font-size:44px;font-weight:900;color:var(--accent);text-shadow:0 0 18px var(--accent);margin:6px 0;}
  .gameover-box .stage-note{color:var(--neon-cyan);font-size:13px;letter-spacing:2px;margin-bottom:4px;}
  .gameover-box .hs-note{color:var(--neon-yellow);font-size:13px;letter-spacing:2px;margin-bottom:14px;min-height:18px;}
  .gameover-box .go-actions{display:flex;gap:10px;margin-top:4px;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>
<body>
<div id="app"><div id="stage">
  <div class="hud">
    <button id="btnExit" class="hud-btn exit" aria-label="יציאה">✕</button>
    <div class="hud-center">
      <div class="score-group"><div class="label">SCORE</div><div id="score" class="val">0</div></div>
      <div class="score-group"><div class="label">HI</div><div id="hiscore" class="val hi">0</div></div>
      <div class="score-group"><div class="label">LIVES</div><div id="lives" class="lives"></div></div>
    </div>
    <div class="hud-right">
      <button id="btnSound" class="hud-btn" aria-label="סאונד">🔊</button>
      <button id="btnPause" class="hud-btn" aria-label="פאוז">⏸</button>
    </div>
  </div>

  <div class="play">
    <canvas id="game"></canvas>
    <div id="readyBanner" class="ready-banner">READY!</div>
    <div id="pauseLabel" class="pause-label">המשחק מושהה</div>
  </div>

  <div class="controls">
    <div class="dpad">
      <button class="d-up"    data-dir="up">▲</button>
      <button class="d-right" data-dir="right">▶</button>
      <button class="d-center" tabindex="-1"></button>
      <button class="d-left"  data-dir="left">◀</button>
      <button class="d-down"  data-dir="down">▼</button>
    </div>
    <div class="action-wrap">
      <button id="btnAction" class="action">TURBO</button>
      <canvas id="turboRing" class="turbo-ring" width="104" height="104"></canvas>
    </div>
  </div>

  <div id="opener" class="opener"><div class="gm-name">PAC-MAN</div></div>

  <div id="exitModal" class="overlay">
    <div class="overlay-box">
      <div class="overlay-title">לצאת מהמשחק?</div>
      <div class="overlay-actions">
        <button id="exitYes" class="btn btn-yes">כן</button>
        <button id="exitNo"  class="btn btn-no">לא</button>
      </div>
    </div>
  </div>

  <div id="gameOver" class="overlay">
    <div class="overlay-box gameover-box">
      <div class="overlay-title">סיום משחק</div>
      <div id="finalScore" class="big-score">0</div>
      <div id="stageNote" class="stage-note">&nbsp;</div>
      <div id="hsNote" class="hs-note">&nbsp;</div>
      <div class="go-actions">
        <button id="playAgain" class="btn btn-yes">שחק שוב</button>
        <button id="backHome"  class="btn btn-no">חזרה ל־ARCADYA</button>
      </div>
    </div>
  </div>
</div></div>

<script>
const SFX = ARCADYA.makeSFX({
  chomp:    (beep, hi) => beep(hi?640:420,0.04,'square',0.08),
  power:    beep => { beep(660,0.1,'triangle',0.12); setTimeout(()=>beep(990,0.12,'triangle',0.12),100); },
  eatGhost: (beep, n) => { beep(400+n*200,0.12,'triangle',0.14); setTimeout(()=>beep(800+n*300,0.1,'triangle',0.12),80); },
  die:      beep => { beep(440,0.15,'sawtooth',0.14); setTimeout(()=>beep(220,0.25,'sawtooth',0.14),180); setTimeout(()=>beep(110,0.4,'sawtooth',0.12),400); },
  fruit:    beep => { beep(880,0.08,'triangle',0.12); setTimeout(()=>beep(1320,0.1,'triangle',0.1),80); },
  levelUp:  beep => { beep(660,0.08,'triangle',0.1); setTimeout(()=>beep(990,0.08,'triangle',0.1),90); setTimeout(()=>beep(1320,0.14,'triangle',0.1),180); }
});

/* ====== Shell ====== */
const HS_KEY = 'arcadya_pacman_high_score';
const $ = id => document.getElementById(id);
let paused=false, gameOverShown=false, running=false;

SFX.open();
setTimeout(()=>{ $('opener').style.display='none'; startGame(); }, 4000);

function refreshSoundBtn(){ $('btnSound').textContent = SFX.isMuted() ? '🔇' : '🔊'; }
refreshSoundBtn();
$('btnSound').addEventListener('click', ()=>{ SFX.toggle(); refreshSoundBtn(); SFX.click(); });

$('btnPause').addEventListener('click', togglePause);
function togglePause(){
  if(gameOverShown) return;
  paused = !paused;
  $('btnPause').textContent = paused ? '▶' : '⏸';
  $('pauseLabel').classList.toggle('active', paused);
  SFX.click();
}

$('btnExit').addEventListener('click', ()=>{ SFX.click(); $('exitModal').classList.add('active'); if(!paused) togglePause(); });
$('exitNo').addEventListener('click', ()=>{ SFX.click(); $('exitModal').classList.remove('active'); if(paused) togglePause(); });
$('exitYes').addEventListener('click', ()=>{ window.location.href = '../index.html?home=1'; });

$('playAgain').addEventListener('click', ()=>{ SFX.click(); $('gameOver').classList.remove('active'); gameOverShown = false; startGame(); });
$('backHome').addEventListener('click',  ()=>{ window.location.href = '../index.html?home=1'; });

/* ====== Maze ====== */
/* Legend: # wall, . pellet, o power pellet, - ghost door, space walkable empty */
const MAZE = [
  "###################",
  "#........#........#",
  "#o##.###.#.###.##o#",
  "#.##.###.#.###.##.#",
  "#.................#",
  "#.##.#.#####.#.##.#",
  "#....#...#...#....#",
  "####.###.#.###.####",
  "   #.#       #.#   ",
  "####.# ##-## #.####",
  "    .  #   #  .    ",
  "####.# ##### #.####",
  "   #.#       #.#   ",
  "####.###.#.###.####",
  "#........#........#",
  "#.##.###.#.###.##.#",
  "#o.#...........#.o#",
  "##.#.#.#######.#.##",
  "#....#...#...#....#",
  "#.######.#.######.#",
  "#.................#",
  "###################",
];
const COLS = MAZE[0].length;   // 19
const ROWS = MAZE.length;      // 22
const CELL = 20;
const DESIGN_W = COLS * CELL;  // 380
const DESIGN_H = ROWS * CELL;  // 440
const TUNNEL_ROW = 10;

// Pre-parsed: each cell type
const WALL=1, PELLET=2, POWER=3, EMPTY=0, DOOR=4;
let grid; // fresh grid per level
function parseGrid(){
  const g = [];
  for(let r=0;r<ROWS;r++){
    const row = [];
    for(let c=0;c<COLS;c++){
      const ch = MAZE[r][c];
      if(ch === '#') row.push(WALL);
      else if(ch === '.') row.push(PELLET);
      else if(ch === 'o') row.push(POWER);
      else if(ch === '-') row.push(DOOR);
      else row.push(EMPTY);
    }
    g.push(row);
  }
  return g;
}
function countPellets(g){
  let n = 0;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(g[r][c]===PELLET||g[r][c]===POWER) n++;
  return n;
}

/* ====== Canvas ====== */
const canvas = $('game'), ctx2d = canvas.getContext('2d');
function fitCanvas(){
  const play = document.querySelector('.play');
  const pw = play.clientWidth - 8, ph = play.clientHeight - 8;
  const ratio = DESIGN_W / DESIGN_H;
  let w = pw, h = pw / ratio;
  if(h > ph){ h = ph; w = ph * ratio; }
  canvas.width = DESIGN_W; canvas.height = DESIGN_H;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
}
window.addEventListener('resize', ()=>{ fitCanvas(); if(state) draw(); });

/* ====== Movement helpers ====== */
const DIRS = {
  up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0}
};
function cellOf(px){ return Math.floor(px / CELL); }
function centerOf(c){ return c*CELL + CELL/2; }
function cellAt(c,r){
  if(r < 0 || r >= ROWS) return WALL;
  if(c < 0 || c >= COLS){
    // tunnel row wraps
    if(r === TUNNEL_ROW) return EMPTY;
    return WALL;
  }
  return grid[r][c];
}
function isWalkable(c,r, forGhost=false){
  const v = cellAt(c,r);
  if(v === WALL) return false;
  if(v === DOOR) return forGhost;
  return true;
}

/* ====== Game state ====== */
let state;
function startGame(){
  fitCanvas();
  grid = parseGrid();
  state = {
    stage: 1,
    score: 0,
    lives: 3,
    hi: parseInt(localStorage.getItem(HS_KEY)||'0',10),
    pellets: countPellets(grid),
    pac: makePac(),
    ghosts: makeGhosts(),
    fright: 0,         // frightened time remaining (ms)
    chain: 0,          // consecutive ghost eats during fright
    fruit: null,
    fruitTimer: 0,
    status: 'ready',   // ready | playing | dying | levelClear
    statusUntil: performance.now() + 1400,
    lastT: performance.now(),
    turbo: { held:false, energy:2000, max:2000, cooldown:0, active:false },
    input: { nextDir:null },
  };
  updateHud();
  $('readyBanner').classList.add('show');
  running = true;
  requestAnimationFrame(loop);
}

function makePac(){
  // spawn at col 9 row 16 (center-ish bottom)
  const c = 9, r = 16;
  return {
    x: centerOf(c), y: centerOf(r),
    dir: null, nextDir: null,
    mouth: 0,     // animation 0..1
    alive: true,
    baseSpeed: 1.6
  };
}

function makeGhosts(){
  // spawn row 10 cols 8,9,10 and one above
  const specs = [
    { id:'blinky', color:'#ff4a6b', c:9, r:8, scatter:{c:17,r:1}, exitDelay:0,    ai:'chase' },
    { id:'pinky',  color:'#ff9ed8', c:9, r:10, scatter:{c:1,r:1},  exitDelay:1600, ai:'ambush' },
    { id:'inky',   color:'#00e6ff', c:8, r:10, scatter:{c:17,r:20},exitDelay:3200, ai:'mix' },
    { id:'clyde',  color:'#ffb14a', c:10,r:10, scatter:{c:1,r:20}, exitDelay:4800, ai:'shy' },
  ];
  const now = performance.now();
  return specs.map(s => ({
    id:s.id, color:s.color,
    x: centerOf(s.c), y: centerOf(s.r),
    home: { x: centerOf(s.c), y: centerOf(s.r) },
    scatter: s.scatter,
    ai: s.ai,
    dir: 'up',
    state: s.r >= 9 ? 'pen' : 'out',   // pen | exiting | out | frightened | eyes
    spawnTime: now + s.exitDelay,
    baseSpeed: 1.3
  }));
}

function updateHud(){
  $('score').textContent = state.score;
  $('hiscore').textContent = Math.max(state.hi, state.score);
  const lv = $('lives'); lv.innerHTML = '';
  for(let i=0;i<state.lives;i++){ const d=document.createElement('div'); d.className='pac'; lv.appendChild(d); }
}

/* ====== Main loop ====== */
function loop(now){
  if(!running) return;
  const dt = Math.min(32, now - state.lastT);
  state.lastT = now;
  if(!paused) update(dt, now);
  draw();
  drawTurboRing();
  requestAnimationFrame(loop);
}

function update(dt, now){
  const s = state;

  // READY banner ticks
  if(s.status === 'ready'){
    if(now >= s.statusUntil){
      s.status = 'playing';
      $('readyBanner').classList.remove('show');
    }
    return;
  }
  if(s.status === 'dying'){
    if(now >= s.statusUntil){
      if(s.lives <= 0){ endGame(); return; }
      resetAfterDeath();
    }
    return;
  }
  if(s.status === 'levelClear'){
    if(now >= s.statusUntil){
      nextLevel();
    }
    return;
  }

  // Frightened timer
  if(s.fright > 0){
    s.fright -= dt;
    if(s.fright <= 0){
      s.fright = 0; s.chain = 0;
      for(const g of s.ghosts) if(g.state === 'frightened') g.state = 'out';
    }
  }

  // Turbo logic
  const T = s.turbo;
  if(T.held && T.cooldown <= 0 && T.energy > 0){
    T.active = true;
    T.energy = Math.max(0, T.energy - dt);
    if(T.energy === 0){ T.cooldown = 3000; T.active = false; T.held = false; $('btnAction').classList.add('cooldown'); }
  } else {
    T.active = false;
    if(T.cooldown > 0){
      T.cooldown -= dt;
      if(T.cooldown <= 0){
        T.cooldown = 0; T.energy = T.max;
        $('btnAction').classList.remove('cooldown');
      }
    } else if(!T.held){
      T.energy = Math.min(T.max, T.energy + dt*0.5); // slow passive recharge
    }
  }

  updatePac(dt, now);
  for(const g of s.ghosts) updateGhost(g, dt, now);
  checkCollisions();

  // Fruit spawn: at 70 and 170 pellets eaten
  const eaten = countInitialPellets() - countRemaining();
  if(!s.fruit && (eaten === 70 || eaten === 170) && s.status === 'playing'){
    s.fruit = { x: centerOf(9), y: centerOf(13), value: 100 + (s.stage-1)*50 };
    s.fruitTimer = 9000;
  }
  if(s.fruit){
    s.fruitTimer -= dt;
    if(s.fruitTimer <= 0) s.fruit = null;
  }
}

function countInitialPellets(){ return state.pelletsBase || state.pellets; }
function countRemaining(){ return countPellets(grid); }

function updatePac(dt, now){
  const s = state, p = s.pac;
  // try queued direction when near cell center
  const cc = cellOf(p.x), cr = cellOf(p.y);
  const nearCenter = Math.abs(p.x - centerOf(cc)) < 2.2 && Math.abs(p.y - centerOf(cr)) < 2.2;
  if(nearCenter && s.input.nextDir){
    const d = DIRS[s.input.nextDir];
    if(isWalkable(cc + d.x, cr + d.y, false)){
      p.dir = s.input.nextDir;
      // snap to center
      p.x = centerOf(cc); p.y = centerOf(cr);
      s.input.nextDir = null;
    }
  }
  // move
  if(p.dir){
    const d = DIRS[p.dir];
    const speed = p.baseSpeed * (s.turbo.active ? 1.45 : 1.0) * (dt/16.67);
    // check ahead
    const ahead = p.x + d.x * speed;
    const aheady = p.y + d.y * speed;
    // Wall collision: if moving would cross into a wall at next cell center
    const nextC = cellOf(ahead + d.x * (CELL/2 - 1));
    const nextR = cellOf(aheady + d.y * (CELL/2 - 1));
    if(isWalkable(nextC, nextR, false)){
      p.x = ahead; p.y = aheady;
    } else {
      // snap to current cell center (stop)
      p.x = centerOf(cc); p.y = centerOf(cr);
    }
    // Tunnel wrap
    if(cr === TUNNEL_ROW){
      if(p.x < -CELL/2) p.x = DESIGN_W + CELL/2;
      if(p.x > DESIGN_W + CELL/2) p.x = -CELL/2;
    }
    p.mouth = (p.mouth + dt/120) % 1;
  }
  // Eat pellet at current cell
  const ec = cellOf(p.x), er = cellOf(p.y);
  const v = cellAt(ec, er);
  if(v === PELLET){
    grid[er][ec] = EMPTY;
    s.score += 10; updateHud();
    SFX.chomp((ec+er)%2);
  } else if(v === POWER){
    grid[er][ec] = EMPTY;
    s.score += 50; updateHud();
    s.fright = Math.max(4000, 8000 - (s.stage-1)*1000);
    s.chain = 0;
    for(const g of s.ghosts){
      if(g.state === 'out' || g.state === 'frightened' || g.state === 'exiting'){
        g.state = 'frightened';
        // reverse direction
        g.dir = oppositeDir(g.dir);
      }
    }
    SFX.power();
  }
  // Fruit
  if(s.fruit){
    if(Math.abs(p.x - s.fruit.x) < CELL*0.6 && Math.abs(p.y - s.fruit.y) < CELL*0.6){
      s.score += s.fruit.value;
      updateHud();
      s.fruit = null;
      SFX.fruit();
    }
  }
  // Level clear?
  if(countRemaining() === 0 && s.status === 'playing'){
    s.status = 'levelClear';
    s.statusUntil = now + 1500;
    s.score += 500;
    updateHud();
    SFX.levelUp();
  }
}

function oppositeDir(d){
  return { up:'down', down:'up', left:'right', right:'left' }[d] || d;
}

function updateGhost(g, dt, now){
  const s = state;
  // Pen exit timer — always evaluated so ghosts leave even while "near center"
  if(g.state === 'pen'){
    if(now >= g.spawnTime){
      g.state = 'exiting';
      g.dir = 'up';
      g.lastCell = null; // force re-decide at current cell
    } else {
      return;
    }
  }

  // Choose target
  let target;
  const pc = cellOf(s.pac.x), pr = cellOf(s.pac.y);
  if(g.state === 'frightened'){
    target = null; // random
  } else if(g.state === 'eyes'){
    target = { c: 9, r: 10 };
  } else if(g.state === 'exiting'){
    target = { c: 9, r: 7 };
  } else {
    const phase = Math.floor(now / 8000) % 5;
    const scatterPhase = (phase === 0);
    if(scatterPhase){
      target = g.scatter;
    } else {
      target = ghostChaseTarget(g, pc, pr);
    }
  }

  // speed
  let speed = g.baseSpeed + (s.stage-1)*0.1;
  if(g.state === 'frightened') speed *= 0.55;
  if(g.state === 'eyes') speed *= 2.0;
  if(g.state === 'exiting') speed *= 0.9;
  speed *= (dt/16.67);

  // Decide once per cell entry (prevents center-snap loop)
  const gc = cellOf(g.x), gr = cellOf(g.y);
  const atCenter = Math.abs(g.x - centerOf(gc)) < Math.max(2.5, speed + 0.6) &&
                   Math.abs(g.y - centerOf(gr)) < Math.max(2.5, speed + 0.6);
  const cellKey = gc + ',' + gr;
  const justEnteredCell = g.lastCell !== cellKey;

  if(atCenter && justEnteredCell){
    g.lastCell = cellKey;

    // Eyes → pen
    if(g.state === 'eyes' && gc === 9 && gr === 10){
      g.state = 'pen'; g.spawnTime = now + 500;
      g.x = centerOf(gc); g.y = centerOf(gr);
      return;
    }
    // Exiting done?
    if(g.state === 'exiting' && gr <= 7){
      g.state = 'out';
    }

    // Choose direction (no reverse unless forced)
    const allowDoor = (g.state === 'exiting' || g.state === 'eyes');
    const options = ['up','right','down','left'].filter(d => {
      if(d === oppositeDir(g.dir)) return false;
      const dd = DIRS[d];
      return isWalkable(gc + dd.x, gr + dd.y, allowDoor);
    });
    let choice;
    if(options.length === 0){
      choice = oppositeDir(g.dir);
    } else if(g.state === 'frightened' || !target){
      choice = options[Math.floor(Math.random()*options.length)];
    } else {
      let best = options[0], bestD = Infinity;
      for(const d of options){
        const dd = DIRS[d];
        const nc = gc + dd.x, nr = gr + dd.y;
        const dx = nc - target.c, dy = nr - target.r;
        const dist = dx*dx + dy*dy;
        if(dist < bestD){ bestD = dist; best = d; }
      }
      choice = best;
    }

    // Snap to cell center only when turning perpendicular (or reversing)
    const newDir = DIRS[choice];
    const oldDir = DIRS[g.dir] || {x:0,y:0};
    if(newDir.x !== oldDir.x || newDir.y !== oldDir.y){
      g.x = centerOf(gc); g.y = centerOf(gr);
    }
    g.dir = choice;
  }

  // Move in current direction
  const dd = DIRS[g.dir];
  if(dd){
    g.x += dd.x * speed;
    g.y += dd.y * speed;
  }

  // Tunnel wrap
  if(gr === TUNNEL_ROW){
    if(g.x < -CELL/2) g.x = DESIGN_W + CELL/2;
    if(g.x > DESIGN_W + CELL/2) g.x = -CELL/2;
  }
}

function ghostChaseTarget(g, pc, pr){
  const p = state.pac;
  if(g.ai === 'chase') return { c: pc, r: pr };
  if(g.ai === 'ambush'){
    const d = DIRS[p.dir || 'left'];
    return { c: pc + d.x*4, r: pr + d.y*4 };
  }
  if(g.ai === 'mix'){
    if(Math.random() < 0.6) return { c: pc, r: pr };
    return g.scatter;
  }
  if(g.ai === 'shy'){
    // stay away if close; chase if far
    const dx = pc - cellOf(g.x), dy = pr - cellOf(g.y);
    const dist = Math.sqrt(dx*dx + dy*dy);
    const threshold = 8 - (state.stage-1)*0.5;
    if(dist > threshold) return { c: pc, r: pr };
    return g.scatter;
  }
  return { c: pc, r: pr };
}

function checkCollisions(){
  const s = state;
  if(s.status !== 'playing') return;
  for(const g of s.ghosts){
    if(g.state === 'eyes' || g.state === 'pen') continue;
    if(Math.abs(g.x - s.pac.x) < CELL*0.7 && Math.abs(g.y - s.pac.y) < CELL*0.7){
      if(g.state === 'frightened'){
        s.chain++;
        const pts = [200,400,800,1600][Math.min(3, s.chain-1)];
        s.score += pts; updateHud();
        SFX.eatGhost(s.chain-1);
        g.state = 'eyes';
      } else {
        die();
        return;
      }
    }
  }
}

function die(){
  const s = state;
  if(s.status !== 'playing') return;   // guard: don't decrement lives twice per frame
  s.status = 'dying';
  s.statusUntil = performance.now() + 1500;
  s.lives--;
  SFX.die();
  updateHud();
}

function resetAfterDeath(){
  const s = state;
  s.pac = makePac();
  s.ghosts = makeGhosts();
  s.fright = 0; s.chain = 0;
  s.fruit = null;
  s.input.nextDir = null;
  s.status = 'ready';
  s.statusUntil = performance.now() + 1400;
  $('readyBanner').classList.add('show');
}

function nextLevel(){
  const s = state;
  s.stage++;
  grid = parseGrid();
  s.pellets = countPellets(grid);
  s.pelletsBase = s.pellets;
  s.pac = makePac();
  s.ghosts = makeGhosts();
  s.fright = 0; s.chain = 0; s.fruit = null;
  s.input.nextDir = null;
  s.status = 'ready';
  s.statusUntil = performance.now() + 1400;
  // speed bump
  for(const g of s.ghosts) g.baseSpeed += 0.15;
  s.pac.baseSpeed += 0.08;
  $('readyBanner').classList.add('show');
}

function endGame(){
  running = false;
  const s = state;
  const prev = parseInt(localStorage.getItem(HS_KEY)||'0',10);
  if(s.score > prev) localStorage.setItem(HS_KEY, s.score);
  $('finalScore').textContent = s.score;
  $('stageNote').textContent = 'שלב ' + s.stage;
  $('hsNote').innerHTML = (s.score > prev && s.score > 0) ? '🏆 שיא חדש!' : 'שיא: ' + prev;
  gameOverShown = true;
  setTimeout(()=>$('gameOver').classList.add('active'), 400);
}

/* ====== Initial pellet count cache ====== */
(function hook(){
  // After first grid build, cache pellet count
  const origStart = startGame;
  startGame = function(){
    origStart();
    state.pelletsBase = state.pellets;
  };
})();

/* ====== Drawing ====== */
function draw(){
  const W = DESIGN_W, H = DESIGN_H;
  ctx2d.fillStyle = '#04010e';
  ctx2d.fillRect(0,0,W,H);

  // Walls
  drawMaze();

  // Pellets
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const v = grid[r][c];
      const x = centerOf(c), y = centerOf(r);
      if(v === PELLET){
        ctx2d.fillStyle = '#ffd9a0';
        ctx2d.beginPath(); ctx2d.arc(x,y,2,0,Math.PI*2); ctx2d.fill();
      } else if(v === POWER){
        const blink = (Math.floor(performance.now()/250)%2) === 0;
        if(blink){
          ctx2d.fillStyle = '#ffe94a';
          ctx2d.shadowColor = '#ffe94a'; ctx2d.shadowBlur = 10;
          ctx2d.beginPath(); ctx2d.arc(x,y,5,0,Math.PI*2); ctx2d.fill();
          ctx2d.shadowBlur = 0;
        }
      }
    }
  }

  // Fruit
  if(state.fruit){
    ctx2d.fillStyle = '#ff4a6b';
    ctx2d.shadowColor = '#ff4a6b'; ctx2d.shadowBlur = 10;
    ctx2d.beginPath(); ctx2d.arc(state.fruit.x, state.fruit.y, 7, 0, Math.PI*2); ctx2d.fill();
    ctx2d.shadowBlur = 0;
    ctx2d.fillStyle = '#3dff9a';
    ctx2d.fillRect(state.fruit.x - 1, state.fruit.y - 10, 2, 4);
  }

  // Ghosts
  for(const g of state.ghosts) drawGhost(g);

  // Pac-Man
  if(state.status !== 'dying'){
    drawPac(state.pac);
  } else {
    drawPacDying();
  }
}

function drawMaze(){
  ctx2d.strokeStyle = '#4a7bff';
  ctx2d.lineWidth = 2;
  ctx2d.shadowColor = '#4a7bff'; ctx2d.shadowBlur = 6;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c] === WALL){
        const x = c*CELL, y = r*CELL;
        ctx2d.strokeRect(x+2, y+2, CELL-4, CELL-4);
      } else if(grid[r][c] === DOOR){
        ctx2d.shadowBlur = 0;
        ctx2d.fillStyle = '#ff9ed8';
        ctx2d.fillRect(c*CELL+2, r*CELL+CELL/2-1, CELL-4, 3);
        ctx2d.shadowColor = '#4a7bff'; ctx2d.shadowBlur = 6;
      }
    }
  }
  ctx2d.shadowBlur = 0;
}

function drawPac(p){
  const m = 0.1 + 0.35 * Math.abs(Math.sin(p.mouth * Math.PI));
  const dirAngles = { right:0, down:Math.PI/2, left:Math.PI, up:-Math.PI/2 };
  const base = dirAngles[p.dir || 'right'];
  const r = CELL*0.45;
  ctx2d.save();
  ctx2d.translate(p.x, p.y);
  ctx2d.rotate(base);
  ctx2d.fillStyle = '#ffe94a';
  ctx2d.shadowColor = '#ffe94a'; ctx2d.shadowBlur = 12;
  ctx2d.beginPath();
  ctx2d.moveTo(0,0);
  ctx2d.arc(0,0, r, m*Math.PI, (2-m)*Math.PI);
  ctx2d.closePath();
  ctx2d.fill();
  ctx2d.shadowBlur = 0;
  ctx2d.restore();
}

function drawPacDying(){
  const s = state;
  const tLeft = s.statusUntil - performance.now();
  const t = 1 - tLeft/1500;
  const r = CELL*0.45 * (1 - t*0.7);
  ctx2d.fillStyle = '#ffe94a';
  ctx2d.shadowColor = '#ffe94a'; ctx2d.shadowBlur = 12;
  ctx2d.beginPath();
  ctx2d.arc(s.pac.x, s.pac.y, Math.max(1, r), 0, Math.PI*2);
  ctx2d.fill();
  ctx2d.shadowBlur = 0;
}

function drawGhost(g){
  const r = CELL*0.45;
  let body = g.color;
  if(g.state === 'frightened'){
    const flashing = state.fright < 1600 && (Math.floor(performance.now()/200)%2===0);
    body = flashing ? '#fff' : '#2030a0';
  } else if(g.state === 'eyes'){
    body = null;
  }
  ctx2d.save();
  ctx2d.translate(g.x, g.y);
  if(body){
    ctx2d.fillStyle = body;
    ctx2d.shadowColor = body; ctx2d.shadowBlur = 10;
    ctx2d.beginPath();
    ctx2d.arc(0, -2, r, Math.PI, 0);
    ctx2d.lineTo(r, r-2);
    // wavy bottom
    const segs = 4;
    for(let i=0;i<segs;i++){
      const dx = r - (i*2+1)*(r*2/(segs*2));
      ctx2d.lineTo(dx, r - (i%2===0?r*0.2:-r*0.2)*0 + (i%2===0? 0 : -r*0.25));
    }
    ctx2d.lineTo(-r, r-2);
    ctx2d.closePath();
    ctx2d.fill();
    ctx2d.shadowBlur = 0;
  }
  // eyes
  const eyeDir = DIRS[g.dir] || DIRS.left;
  const eyeColor = (g.state === 'frightened' && body !== '#fff') ? '#ffe94a' : '#fff';
  ctx2d.fillStyle = eyeColor;
  ctx2d.beginPath(); ctx2d.arc(-r*0.4, -r*0.2, r*0.28, 0, Math.PI*2); ctx2d.fill();
  ctx2d.beginPath(); ctx2d.arc( r*0.4, -r*0.2, r*0.28, 0, Math.PI*2); ctx2d.fill();
  if(g.state !== 'frightened'){
    ctx2d.fillStyle = '#1020a0';
    ctx2d.beginPath(); ctx2d.arc(-r*0.4 + eyeDir.x*2, -r*0.2 + eyeDir.y*2, r*0.15, 0, Math.PI*2); ctx2d.fill();
    ctx2d.beginPath(); ctx2d.arc( r*0.4 + eyeDir.x*2, -r*0.2 + eyeDir.y*2, r*0.15, 0, Math.PI*2); ctx2d.fill();
  }
  ctx2d.restore();
}

/* ====== Turbo ring ====== */
const ringCanvas = $('turboRing'), ringCtx = ringCanvas.getContext('2d');
function drawTurboRing(){
  const W = 104, H = 104;
  ringCtx.clearRect(0,0,W,H);
  if(!state) return;
  const T = state.turbo;
  const cx = W/2, cy = H/2;
  let frac = 0, color = '#ffe94a';
  if(T.cooldown > 0){
    frac = 1 - T.cooldown / 3000;
    color = '#ff4a6b';
  } else {
    frac = T.energy / T.max;
    color = T.active ? '#3dff9a' : '#ffe94a';
  }
  ringCtx.strokeStyle = 'rgba(255,255,255,0.12)';
  ringCtx.lineWidth = 3;
  ringCtx.beginPath();
  ringCtx.arc(cx,cy, 48, 0, Math.PI*2);
  ringCtx.stroke();
  ringCtx.strokeStyle = color;
  ringCtx.lineWidth = 3;
  ringCtx.shadowColor = color; ringCtx.shadowBlur = 6;
  ringCtx.beginPath();
  ringCtx.arc(cx,cy, 48, -Math.PI/2, -Math.PI/2 + Math.PI*2*frac);
  ringCtx.stroke();
  ringCtx.shadowBlur = 0;
}

function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

/* ====== Input ====== */
function queueDir(dir){
  if(!state) return;
  state.input.nextDir = dir;
  SFX.click();
  // Try immediate turn if possible
  const p = state.pac;
  const cc = cellOf(p.x), cr = cellOf(p.y);
  const d = DIRS[dir];
  if(isWalkable(cc + d.x, cr + d.y, false)){
    const nearCenter = Math.abs(p.x - centerOf(cc)) < 3 && Math.abs(p.y - centerOf(cr)) < 3;
    if(nearCenter || oppositeDir(dir) === p.dir){
      p.dir = dir;
      if(oppositeDir(dir) === p.dir){ // was reversed, already set
      } else {
        p.x = centerOf(cc); p.y = centerOf(cr);
      }
      state.input.nextDir = null;
    }
  }
}

document.querySelectorAll('.dpad [data-dir]').forEach(btn => {
  const dir = btn.dataset.dir;
  // Use touchstart + click. preventDefault on touchstart stops the long-press
  // context menu / selection overlay that appears on mobile browsers.
  btn.addEventListener('touchstart', e => { e.preventDefault(); queueDir(dir); }, {passive:false});
  btn.addEventListener('click', ()=> queueDir(dir));
  btn.addEventListener('contextmenu', e => e.preventDefault());
});
document.addEventListener('keydown', e=>{
  if(!state) return;
  if(e.key === 'ArrowUp')    queueDir('up');
  else if(e.key === 'ArrowDown')  queueDir('down');
  else if(e.key === 'ArrowLeft')  queueDir('left');
  else if(e.key === 'ArrowRight') queueDir('right');
  else if(e.key === ' ')          { e.preventDefault(); actionPress(); }
  else if(e.key === 'p' || e.key === 'P') togglePause();
});
document.addEventListener('keyup', e=>{
  if(e.key === ' ') actionRelease();
});

const actionBtn = $('btnAction');
function actionPress(){
  if(!state) return;
  if(state.turbo.cooldown > 0) return;
  state.turbo.held = true;
  actionBtn.style.filter = 'brightness(1.2)';
}
function actionRelease(){
  if(!state) return;
  state.turbo.held = false;
  actionBtn.style.filter = '';
}
actionBtn.addEventListener('touchstart', e=>{e.preventDefault();actionPress();}, {passive:false});
actionBtn.addEventListener('touchend',   e=>{e.preventDefault();actionRelease();}, {passive:false});
actionBtn.addEventListener('mousedown', actionPress);
actionBtn.addEventListener('mouseup',   actionRelease);
actionBtn.addEventListener('mouseleave',actionRelease);

// Swipe on play area
(function(){
  const play = document.querySelector('.play');
  let sx=0, sy=0, tracking=false;
  play.addEventListener('touchstart', e=>{ const t=e.touches[0]; sx=t.clientX; sy=t.clientY; tracking=true; }, {passive:true});
  play.addEventListener('touchmove',  e=>{
    if(!tracking) return;
    const t=e.touches[0]; const dx=t.clientX-sx, dy=t.clientY-sy;
    if(Math.abs(dx)>20 || Math.abs(dy)>20){
      if(Math.abs(dx)>Math.abs(dy)) queueDir(dx>0?'right':'left');
      else queueDir(dy>0?'down':'up');
      tracking = false;
    }
  }, {passive:true});
  play.addEventListener('touchend', ()=>tracking=false);
})();
</script>
