<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#05010f" />
<link rel="icon" type="image/svg+xml" href="../assets/icons/icon.svg" />
<link rel="stylesheet" href="../assets/arcadya-shell.css" />
<script src="../assets/arcadya-shell.js"></script>
<title>ARCADYA — INVADERS</title>
<style>
  :root{
    --bg-0:#05010f; --bg-1:#0b0320;
    --neon-pink:#ff2d95; --neon-cyan:#00e6ff; --neon-purple:#b14bff;
    --neon-yellow:#ffe94a; --neon-green:#3dff9a;
    --text:#fff; --muted:#a79ec9; --danger:#ff4a6b;
    --accent:#b14bff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Heebo",Tahoma,sans-serif;background:var(--bg-0);color:var(--text);overflow:hidden;user-select:none;-webkit-user-select:none;}
  #app{position:relative;width:100vw;height:100vh;height:100dvh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1200px 800px at 50% -10%,rgba(177,75,255,.22),transparent 60%),radial-gradient(900px 600px at 50% 110%,rgba(0,230,255,.16),transparent 60%),linear-gradient(180deg,var(--bg-1) 0%,var(--bg-0) 100%);}
  #stage{position:relative;width:100%;height:100%;max-width:520px;max-height:100%;background:linear-gradient(180deg,#0c0426 0%,#070116 100%);overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.04),0 30px 80px rgba(0,0,0,.6);display:flex;flex-direction:column;}
  @media (min-width:900px){#stage{max-width:440px;max-height:min(900px,95vh);border-radius:28px;border:1px solid rgba(255,255,255,.07);}}

  .hud{position:relative;display:flex;align-items:center;justify-content:space-between;padding:10px 12px;gap:6px;background:linear-gradient(180deg,rgba(255,255,255,.04),transparent);border-bottom:1px solid rgba(255,255,255,.06);z-index:5;}
  .hud-btn{width:38px;height:38px;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .08s;}
  .hud-btn:active{transform:scale(.92);}
  .hud-btn.exit{color:var(--danger);border-color:rgba(255,74,107,.35);background:rgba(255,74,107,.08);}
  .hud-center{display:flex;gap:12px;align-items:center;}
  .score-group{display:flex;flex-direction:column;align-items:center;line-height:1.1;}
  .label{color:var(--muted);font-size:9px;letter-spacing:2px;}
  .val{font-size:16px;font-weight:800;color:var(--accent);text-shadow:0 0 8px rgba(177,75,255,.6);}
  .val.hi{color:var(--neon-yellow);text-shadow:0 0 8px rgba(255,233,74,.5);}
  .lives{display:flex;gap:3px;}
  .lives .ship{width:16px;height:10px;background:var(--neon-green);clip-path:polygon(50% 0,100% 100%,0 100%);filter:drop-shadow(0 0 4px var(--neon-green));}
  .hud-right{display:flex;gap:6px;}

  .play{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;
    background:
      radial-gradient(1px 1px at 20% 15%,#fff,transparent),
      radial-gradient(1px 1px at 70% 40%,#fff6,transparent),
      radial-gradient(1px 1px at 40% 75%,#fff,transparent),
      radial-gradient(1px 1px at 85% 60%,#fff8,transparent),
      radial-gradient(1px 1px at 10% 80%,#fff6,transparent),
      radial-gradient(circle at 50% 50%,rgba(177,75,255,.08),transparent 70%),
      #04010e;
  }
  canvas{display:block;max-width:100%;max-height:100%;}

  .controls{position:relative;border-top:2px solid rgba(255,255,255,.08);background:linear-gradient(180deg,#0a0320,#050110);padding:14px 14px calc(14px + env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:center;min-height:150px;}
  .dpad{position:relative;width:150px;height:150px;justify-self:start;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);}
  .dpad button{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:22px;cursor:pointer;transition:transform .08s,background .1s;}
  .dpad button:active{transform:scale(.9);background:rgba(177,75,255,.3);}
  .dpad button.disabled{opacity:.3;}
  .d-up{grid-column:2;grid-row:1;border-top-left-radius:10px;border-top-right-radius:10px;}
  .d-down{grid-column:2;grid-row:3;border-bottom-left-radius:10px;border-bottom-right-radius:10px;}
  .d-left{grid-column:3;grid-row:2;border-top-left-radius:10px;border-bottom-left-radius:10px;}
  .d-right{grid-column:1;grid-row:2;border-top-right-radius:10px;border-bottom-right-radius:10px;}
  .d-center{grid-column:2;grid-row:2;background:transparent;border:none;pointer-events:none;}

  .action-wrap{display:flex;align-items:center;justify-content:center;}
  .action{width:96px;height:96px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffb078,#ff4a6b 55%,#8a1232 100%);color:#fff;font-weight:900;font-size:16px;letter-spacing:2px;border:none;cursor:pointer;box-shadow:0 0 24px rgba(255,74,107,.55),inset 0 -6px 12px rgba(0,0,0,.3);transition:transform .08s;}
  .action:active{transform:scale(.92);}

  .overlay{position:absolute;inset:0;background:rgba(5,1,15,.85);display:none;align-items:center;justify-content:center;z-index:20;animation:fadeIn .15s ease-out;}
  .overlay.active{display:flex;}
  .overlay-box{width:82%;max-width:320px;text-align:center;background:linear-gradient(180deg,#1a0946,#0c0326);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:24px 20px 20px;box-shadow:0 0 40px rgba(177,75,255,.35);}
  .overlay-title{font-size:18px;font-weight:800;margin-bottom:16px;}
  .overlay-actions{display:flex;gap:10px;justify-content:center;}
  .btn{flex:1;padding:12px 0;border-radius:12px;font-size:15px;font-weight:800;border:1px solid transparent;cursor:pointer;transition:transform .08s;}
  .btn:active{transform:scale(.95);}
  .btn-yes{background:linear-gradient(180deg,#ff2d95,#b14bff);color:#fff;box-shadow:0 6px 20px rgba(255,45,149,.4);}
  .btn-no{background:rgba(255,255,255,.06);color:#fff;border-color:rgba(255,255,255,.15);}
  .pause-label{position:absolute;inset:0;display:none;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:800;letter-spacing:3px;background:rgba(5,1,15,.55);z-index:15;text-shadow:0 0 10px var(--neon-cyan);}
  .pause-label.active{display:flex;}

  .wave-banner{
    position:absolute;top:40%;left:0;right:0;text-align:center;z-index:4;
    font-size:26px;font-weight:900;letter-spacing:6px;color:#fff;
    text-shadow:0 0 12px var(--accent),0 0 28px var(--accent);
    display:none;animation:banner 1.8s forwards;
    pointer-events:none;
  }
  .wave-banner.show{display:block;}
  @keyframes banner{0%{opacity:0;transform:scale(.7);}20%{opacity:1;transform:scale(1);}80%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(1.1);}}

  .opener{position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,#1a0550 0%,#05010f 80%);display:flex;align-items:center;justify-content:center;z-index:30;animation:openerFade 4s forwards;}
  .opener .gm-name{font-size:clamp(38px,11vw,62px);font-weight:900;letter-spacing:6px;color:#fff;text-shadow:0 0 8px #fff,0 0 18px var(--accent),0 0 36px var(--accent),0 0 60px var(--neon-cyan);animation:openerPulse 1s infinite alternate;}
  @keyframes openerFade{0%{opacity:1;}80%{opacity:1;}100%{opacity:0;visibility:hidden;}}
  @keyframes openerPulse{from{transform:scale(.95);}to{transform:scale(1.05);}}

  .gameover-box .big-score{font-size:44px;font-weight:900;color:var(--accent);text-shadow:0 0 18px var(--accent);margin:6px 0;}
  .gameover-box .hs-note{color:var(--neon-yellow);font-size:13px;letter-spacing:2px;margin-bottom:14px;min-height:18px;}
  .gameover-box .wave-note{color:var(--neon-cyan);font-size:13px;letter-spacing:2px;margin-bottom:6px;}
  .gameover-box .go-actions{display:flex;gap:10px;margin-top:4px;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>
<body>
<div id="app"><div id="stage">
  <div class="hud">
    <button id="btnExit" class="hud-btn exit" aria-label="יציאה">✕</button>
    <div class="hud-center">
      <div class="score-group"><div class="label">SCORE</div><div id="score" class="val">0</div></div>
      <div class="score-group"><div class="label">HI</div><div id="hiscore" class="val hi">0</div></div>
      <div class="score-group"><div class="label">LIVES</div><div id="lives" class="lives"></div></div>
    </div>
    <div class="hud-right">
      <button id="btnSound" class="hud-btn" aria-label="סאונד">🔊</button>
      <button id="btnPause" class="hud-btn" aria-label="פאוז">⏸</button>
    </div>
  </div>

  <div class="play">
    <canvas id="game"></canvas>
    <div id="waveBanner" class="wave-banner">WAVE 1</div>
    <div id="pauseLabel" class="pause-label">המשחק מושהה</div>
  </div>

  <div class="controls">
    <div class="dpad">
      <button class="d-up disabled"    data-dir="up">▲</button>
      <button class="d-right"          data-dir="right">▶</button>
      <button class="d-center" tabindex="-1"></button>
      <button class="d-left"           data-dir="left">◀</button>
      <button class="d-down disabled"  data-dir="down">▼</button>
    </div>
    <div class="action-wrap">
      <button id="btnAction" class="action">FIRE</button>
    </div>
  </div>

  <div id="opener" class="opener"><div class="gm-name">INVADERS</div></div>

  <div id="exitModal" class="overlay">
    <div class="overlay-box">
      <div class="overlay-title">לצאת מהמשחק?</div>
      <div class="overlay-actions">
        <button id="exitYes" class="btn btn-yes">כן</button>
        <button id="exitNo"  class="btn btn-no">לא</button>
      </div>
    </div>
  </div>

  <div id="gameOver" class="overlay">
    <div class="overlay-box gameover-box">
      <div class="overlay-title">סיום משחק</div>
      <div id="finalScore" class="big-score">0</div>
      <div id="waveNote" class="wave-note">&nbsp;</div>
      <div id="hsNote" class="hs-note">&nbsp;</div>
      <div class="go-actions">
        <button id="playAgain" class="btn btn-yes">שחק שוב</button>
        <button id="backHome"  class="btn btn-no">חזרה ל־ARCADYA</button>
      </div>
    </div>
  </div>
</div></div>

<script>
const SFX = ARCADYA.makeSFX({
  shoot:     beep => { beep(720,0.06,'square',0.08); setTimeout(()=>beep(440,0.05,'square',0.06),40); },
  hitAlien:  beep => beep(180,0.15,'sawtooth',0.14),
  hitPlayer: beep => beep(100,0.35,'sawtooth',0.18),
  ufo:       beep => beep(820,0.18,'triangle',0.1),
  waveEnd:   beep => { beep(660,0.1,'triangle',0.12); setTimeout(()=>beep(990,0.14,'triangle',0.12),100); }
});

/* ====== Shell ====== */
const HS_KEY = 'arcadya_invaders_high_score';
const $ = id => document.getElementById(id);
let paused=false, gameOverShown=false, running=false;

SFX.open();
setTimeout(()=>{ $('opener').style.display='none'; startGame(); }, 4000);

function refreshSoundBtn(){ $('btnSound').textContent = SFX.isMuted() ? '🔇' : '🔊'; }
refreshSoundBtn();
$('btnSound').addEventListener('click', ()=>{ SFX.toggle(); refreshSoundBtn(); SFX.click(); });

$('btnPause').addEventListener('click', togglePause);
function togglePause(){
  if(gameOverShown) return;
  paused = !paused;
  $('btnPause').textContent = paused ? '▶' : '⏸';
  $('pauseLabel').classList.toggle('active', paused);
  SFX.click();
}

$('btnExit').addEventListener('click', ()=>{ SFX.click(); $('exitModal').classList.add('active'); if(!paused) togglePause(); });
$('exitNo').addEventListener('click', ()=>{ SFX.click(); $('exitModal').classList.remove('active'); if(paused) togglePause(); });
$('exitYes').addEventListener('click', ()=>{ window.location.href = '../index.html?home=1'; });

$('playAgain').addEventListener('click', ()=>{ SFX.click(); $('gameOver').classList.remove('active'); gameOverShown = false; startGame(); });
$('backHome').addEventListener('click',  ()=>{ window.location.href = '../index.html?home=1'; });

/* ====== Game ====== */
const canvas = $('game'), ctx2d = canvas.getContext('2d');
const DESIGN_W = 380, DESIGN_H = 600;

// grid parameters
const COLS = 7, ROWS = 5;
const ALIEN_W = 22, ALIEN_H = 16;
const GAP_X = 12, GAP_Y = 10;
const PLAYER_W = 30, PLAYER_H = 14, PLAYER_Y = DESIGN_H - 34;
const PLAYER_SPEED = 3.6;
const BULLET_SPEED = 7;
const ALIEN_BULLET_SPEED = 3.2;
const MAX_PLAYER_BULLETS = 3;

// Bunker settings: pixel grid, each bunker BW x BH cells
const BUNKER_CELL = 4;            // px per cell
const BUNKER_COLS = 11, BUNKER_ROWS = 7;
const BUNKER_Y = PLAYER_Y - 58;

let state;

function fitCanvas(){
  const play = document.querySelector('.play');
  const pw = play.clientWidth - 8, ph = play.clientHeight - 8;
  const ratio = DESIGN_W / DESIGN_H;
  let w = pw, h = pw / ratio;
  if(h > ph){ h = ph; w = ph * ratio; }
  canvas.width = DESIGN_W; canvas.height = DESIGN_H;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
}
window.addEventListener('resize', ()=>{ fitCanvas(); if(state) draw(); });

function startGame(){
  fitCanvas();
  state = {
    player: { x: DESIGN_W/2, y: PLAYER_Y, vx: 0, alive:true, hitT: 0 },
    bullets: [],        // player bullets
    aBullets: [],       // alien bullets
    aliens: [],
    bunkers: [],
    wave: 1,
    score: 0,
    lives: 3,
    hi: parseInt(localStorage.getItem(HS_KEY)||'0',10),
    dir: 1,             // alien horizontal direction
    stepT: 0,
    stepInterval: 520,
    ufo: null,
    ufoT: performance.now() + 9000 + Math.random()*6000,
    fireQueue: { state:'idle', burst:0, lastShot:0, restUntil:0, held:false },
    lastT: performance.now(),
    freezeUntil: 0,     // brief freeze after losing a life
    input: { left:false, right:false },
  };
  buildWave();
  buildBunkers();
  updateHud();
  showBanner('WAVE 1');
  running = true;
  requestAnimationFrame(loop);
}

function buildWave(){
  const s = state;
  s.aliens = [];
  const startX = (DESIGN_W - (COLS*(ALIEN_W+GAP_X) - GAP_X)) / 2;
  const startY = 50;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const type = r === 0 ? 'top' : (r <= 2 ? 'mid' : 'bot');
      const pts = type === 'top' ? 30 : type === 'mid' ? 20 : 10;
      s.aliens.push({
        gx: c, gy: r, type, pts, alive:true,
        x: startX + c*(ALIEN_W+GAP_X) + ALIEN_W/2,
        y: startY + r*(ALIEN_H+GAP_Y) + ALIEN_H/2
      });
    }
  }
  s.dir = 1;
  s.stepT = performance.now();
  s.stepInterval = Math.max(120, 560 - (s.wave-1)*55);
  s.aBullets = [];
  s.bullets = [];
  s.ufo = null;
  s.ufoT = performance.now() + 9000 + Math.random()*6000;
}

function buildBunkers(){
  const s = state;
  s.bunkers = [];
  // carved shape: remove bottom-center arch + top corners to create classic look
  const template = [];
  for(let r=0;r<BUNKER_ROWS;r++){
    const row = [];
    for(let c=0;c<BUNKER_COLS;c++){
      let on = true;
      // top corners rounded
      if(r===0 && (c===0 || c===BUNKER_COLS-1)) on = false;
      // bottom arch cutout
      if(r >= BUNKER_ROWS-2 && c >= 4 && c <= BUNKER_COLS-5) on = false;
      row.push(on ? 1 : 0);
    }
    template.push(row);
  }
  const bunkerW = BUNKER_COLS * BUNKER_CELL;
  const gap = (DESIGN_W - bunkerW*3) / 4;
  for(let i=0;i<3;i++){
    const bx = gap + i*(bunkerW + gap);
    const by = BUNKER_Y;
    const grid = template.map(row => row.slice());
    s.bunkers.push({ x: bx, y: by, grid });
  }
}

function showBanner(text){
  const el = $('waveBanner');
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(()=> el.classList.remove('show'), 1800);
}

function updateHud(){
  $('score').textContent = state.score;
  $('hiscore').textContent = Math.max(state.hi, state.score);
  const lv = $('lives'); lv.innerHTML = '';
  for(let i=0;i<state.lives;i++){ const d=document.createElement('div'); d.className='ship'; lv.appendChild(d); }
}

/* ====== Main loop ====== */
function loop(now){
  if(!running) return;
  const dt = Math.min(32, now - state.lastT);
  state.lastT = now;
  if(!paused) update(dt, now);
  draw();
  requestAnimationFrame(loop);
}

function update(dt, now){
  const s = state;

  // Freeze briefly after a hit (for flash)
  if(now < s.freezeUntil) { return; }

  // Player movement
  s.player.vx = 0;
  if(s.input.left)  s.player.vx -= PLAYER_SPEED;
  if(s.input.right) s.player.vx += PLAYER_SPEED;
  s.player.x = clamp(s.player.x + s.player.vx * (dt/16.67), PLAYER_W/2+2, DESIGN_W - PLAYER_W/2 - 2);

  // Auto-fire machine (single shot on press, bursts while held)
  handleAutoFire(now);

  // Player bullets
  for(const b of s.bullets){ b.y -= BULLET_SPEED * (dt/16.67); }
  s.bullets = s.bullets.filter(b => b.y > -10);

  // Alien bullets
  for(const b of s.aBullets){ b.y += (ALIEN_BULLET_SPEED + (s.wave-1)*0.4) * (dt/16.67); }
  s.aBullets = s.aBullets.filter(b => b.y < DESIGN_H + 10);

  // Alien step (discrete move like classic)
  if(now - s.stepT >= s.stepInterval){
    s.stepT = now;
    stepAliens();
    // pitch-shift march sound
    SFX.click();
  }

  // Alien firing (based on number remaining + wave)
  const alive = s.aliens.filter(a=>a.alive);
  const shootChance = 0.005 + 0.0015*(s.wave-1) + 0.001*(ROWS*COLS - alive.length);
  if(alive.length && Math.random() < shootChance * (dt/16.67)){
    alienShoot(alive);
  }

  // UFO logic
  if(!s.ufo && now > s.ufoT){
    spawnUFO();
  }
  if(s.ufo){
    s.ufo.x += s.ufo.vx * (dt/16.67);
    if(s.ufo.x < -30 || s.ufo.x > DESIGN_W + 30) s.ufo = null;
  }

  // Collisions
  collidePlayerBullets();
  collideAlienBullets();

  // Check wave end / loss
  if(alive.length === 0) nextWave();
  const lowest = alive.reduce((m,a)=> Math.max(m,a.y), 0);
  if(lowest >= BUNKER_Y - 6) { // aliens reached player level
    loseLife(true);
  }
}

function stepAliens(){
  const s = state;
  const alive = s.aliens.filter(a=>a.alive);
  if(alive.length === 0) return;
  const minX = Math.min(...alive.map(a=>a.x));
  const maxX = Math.max(...alive.map(a=>a.x));
  const margin = 8;
  const stepX = 6;
  const stepY = 10;
  let hitWall = false;
  if(s.dir > 0 && maxX + stepX > DESIGN_W - margin) hitWall = true;
  if(s.dir < 0 && minX - stepX < margin) hitWall = true;
  if(hitWall){
    s.dir *= -1;
    for(const a of s.aliens) if(a.alive) a.y += stepY;
  } else {
    for(const a of s.aliens) if(a.alive) a.x += s.dir * stepX;
  }
  // speed up based on remaining
  const factor = alive.length / (ROWS*COLS);
  const baseInterval = Math.max(120, 560 - (s.wave-1)*55);
  s.stepInterval = Math.max(70, baseInterval * (0.35 + factor*0.85));
}

function alienShoot(aliveList){
  // prefer bottom-most per column
  const colsMap = {};
  for(const a of aliveList){
    const c = a.gx;
    if(!colsMap[c] || a.y > colsMap[c].y) colsMap[c] = a;
  }
  const candidates = Object.values(colsMap);
  const shooter = candidates[Math.floor(Math.random()*candidates.length)];
  if(!shooter) return;
  state.aBullets.push({ x: shooter.x, y: shooter.y + ALIEN_H/2 });
}

function spawnUFO(){
  const fromLeft = Math.random() < 0.5;
  state.ufo = {
    x: fromLeft ? -20 : DESIGN_W + 20,
    y: 28,
    vx: (fromLeft ? 1 : -1) * 1.8,
    value: [50,100,150][Math.floor(Math.random()*3)]
  };
  state.ufoT = performance.now() + 12000 + Math.random()*8000;
}

/* ====== Fire control: single press = 1 shot. Hold = 3-shot burst, 700ms rest, repeat ====== */
function handleAutoFire(now){
  const fq = state.fireQueue;
  if(!fq.held){ fq.state = 'idle'; return; }
  const canShootAgain = state.bullets.length < MAX_PLAYER_BULLETS;
  if(fq.state === 'idle'){
    // start burst
    fq.state = 'burst'; fq.burst = 0; fq.lastShot = 0;
  }
  if(fq.state === 'burst'){
    if(canShootAgain && now - fq.lastShot >= 150){
      firePlayer();
      fq.burst++;
      fq.lastShot = now;
      if(fq.burst >= 3){
        fq.state = 'rest';
        fq.restUntil = now + 700;
      }
    }
  } else if(fq.state === 'rest'){
    if(now >= fq.restUntil){
      fq.state = 'burst'; fq.burst = 0;
    }
  }
}

function firePlayer(){
  if(state.bullets.length >= MAX_PLAYER_BULLETS) return;
  state.bullets.push({ x: state.player.x, y: state.player.y - PLAYER_H/2 - 2 });
  SFX.shoot();
}

/* ====== Collisions ====== */
function collidePlayerBullets(){
  const s = state;
  for(let i = s.bullets.length-1; i >= 0; i--){
    const b = s.bullets[i];
    let removed = false;
    // bunkers
    for(const bk of s.bunkers){
      if(hitBunker(bk, b.x, b.y, -1)){ s.bullets.splice(i,1); removed = true; break; }
    }
    if(removed) continue;
    // aliens
    for(const a of s.aliens){
      if(!a.alive) continue;
      if(Math.abs(b.x - a.x) < ALIEN_W/2 && Math.abs(b.y - a.y) < ALIEN_H/2){
        a.alive = false;
        s.score += a.pts;
        if(s.score > s.hi) { s.hi = s.score; localStorage.setItem(HS_KEY, s.hi); }
        updateHud();
        SFX.hitAlien();
        s.bullets.splice(i,1);
        removed = true;
        break;
      }
    }
    if(removed) continue;
    // UFO
    if(s.ufo){
      if(Math.abs(b.x - s.ufo.x) < 16 && Math.abs(b.y - s.ufo.y) < 10){
        s.score += s.ufo.value;
        if(s.score > s.hi) { s.hi = s.score; localStorage.setItem(HS_KEY, s.hi); }
        updateHud();
        SFX.ufo();
        s.ufo = null;
        s.bullets.splice(i,1);
      }
    }
  }
}

function collideAlienBullets(){
  const s = state;
  for(let i = s.aBullets.length-1; i >= 0; i--){
    const b = s.aBullets[i];
    let removed = false;
    for(const bk of s.bunkers){
      if(hitBunker(bk, b.x, b.y, 1)){ s.aBullets.splice(i,1); removed = true; break; }
    }
    if(removed) continue;
    // player
    if(s.player.alive && Math.abs(b.x - s.player.x) < PLAYER_W/2 && Math.abs(b.y - s.player.y) < PLAYER_H/2){
      s.aBullets.splice(i,1);
      loseLife(false);
    }
  }
}

function hitBunker(bk, bx, by, dir){
  // convert world → bunker grid
  if(bx < bk.x || bx > bk.x + BUNKER_COLS*BUNKER_CELL) return false;
  if(by < bk.y || by > bk.y + BUNKER_ROWS*BUNKER_CELL) return false;
  const cx = Math.floor((bx - bk.x) / BUNKER_CELL);
  // trace from entry edge inward
  const rows = BUNKER_ROWS;
  if(dir > 0){ // alien bullet going down: find first 1 from top
    const cyStart = Math.max(0, Math.floor((by - bk.y) / BUNKER_CELL));
    for(let r=cyStart; r<rows; r++){
      if(bk.grid[r] && bk.grid[r][cx] === 1){
        chewBunker(bk, cx, r, 1);
        return true;
      }
    }
    return false;
  } else { // player bullet going up: find first 1 from bottom
    const cyStart = Math.min(rows-1, Math.floor((by - bk.y) / BUNKER_CELL));
    for(let r=cyStart; r>=0; r--){
      if(bk.grid[r] && bk.grid[r][cx] === 1){
        chewBunker(bk, cx, r, -1);
        return true;
      }
    }
    return false;
  }
}

function chewBunker(bk, cx, cy, dir){
  // carve a small organic patch around (cx, cy)
  const pattern = [
    [0,0],[ -1,0],[1,0],[0,dir],[0,dir*2],
    [-1,dir],[1,dir],
    [Math.random()<0.5?-2:2, 0],
    [Math.random()<0.5?-1:1, dir*2]
  ];
  for(const [dx,dy] of pattern){
    if(Math.random() < 0.85){
      const x = cx+dx, y = cy+dy;
      if(bk.grid[y] && bk.grid[y][x] !== undefined) bk.grid[y][x] = 0;
    }
  }
}

function loseLife(touchedByAlien){
  const s = state;
  s.lives--;
  SFX.hitPlayer();
  s.player.hitT = performance.now();
  s.freezeUntil = performance.now() + 600;
  updateHud();
  if(s.lives <= 0 || touchedByAlien){
    // end game immediately
    setTimeout(()=> endGame(), 500);
    running = (s.lives > 0 && !touchedByAlien);
    if(!running) return;
  }
  // reset player position + clear alien bullets
  s.player.x = DESIGN_W/2;
  s.aBullets = [];
}

function nextWave(){
  const s = state;
  SFX.waveEnd();
  const bonus = 100 + s.lives*50;
  s.score += bonus;
  if(s.score > s.hi) { s.hi = s.score; localStorage.setItem(HS_KEY, s.hi); }
  updateHud();
  s.wave++;
  buildWave();
  buildBunkers(); // per user: refreshed on new wave
  showBanner('WAVE ' + s.wave);
}

function endGame(){
  running = false;
  const s = state;
  if(s.score > parseInt(localStorage.getItem(HS_KEY)||'0',10)){
    localStorage.setItem(HS_KEY, s.score);
  }
  const prev = parseInt(localStorage.getItem(HS_KEY)||'0',10);
  $('finalScore').textContent = s.score;
  $('waveNote').textContent = 'גל ' + s.wave;
  $('hsNote').innerHTML = (s.score >= prev && s.score > 0) ? '🏆 שיא חדש!' : 'שיא: ' + prev;
  gameOverShown = true;
  setTimeout(()=>$('gameOver').classList.add('active'), 500);
}

/* ====== Drawing ====== */
function draw(){
  const W = DESIGN_W, H = DESIGN_H;
  ctx2d.clearRect(0,0,W,H);

  // bunkers
  for(const bk of state.bunkers){
    for(let r=0;r<BUNKER_ROWS;r++){
      for(let c=0;c<BUNKER_COLS;c++){
        if(bk.grid[r][c]){
          ctx2d.fillStyle = '#3dff9a';
          ctx2d.fillRect(bk.x + c*BUNKER_CELL, bk.y + r*BUNKER_CELL, BUNKER_CELL, BUNKER_CELL);
        }
      }
    }
  }

  // aliens
  const t = Math.floor(performance.now()/300) % 2;
  for(const a of state.aliens){
    if(!a.alive) continue;
    drawAlien(a.x, a.y, a.type, t);
  }

  // UFO
  if(state.ufo) drawUFO(state.ufo.x, state.ufo.y);

  // player bullets
  ctx2d.fillStyle = '#fff';
  for(const b of state.bullets) ctx2d.fillRect(b.x-1, b.y-6, 2, 10);
  // alien bullets
  ctx2d.fillStyle = '#ff4a6b';
  for(const b of state.aBullets){
    ctx2d.beginPath();
    ctx2d.moveTo(b.x, b.y-6);
    ctx2d.lineTo(b.x-3, b.y);
    ctx2d.lineTo(b.x, b.y+3);
    ctx2d.lineTo(b.x+3, b.y);
    ctx2d.closePath();
    ctx2d.fill();
  }

  // player
  if(state.player.alive){
    const flash = (performance.now() - state.player.hitT) < 600 && Math.floor(performance.now()/80)%2===0;
    if(!flash) drawPlayer(state.player.x, state.player.y);
  }
}

function drawAlien(cx, cy, type, frame){
  const colors = { top:'#ff2d95', mid:'#00e6ff', bot:'#ffe94a' };
  ctx2d.fillStyle = colors[type];
  ctx2d.shadowColor = colors[type]; ctx2d.shadowBlur = 8;
  // pixel-style alien
  const px = (x,y,w=1,h=1)=> ctx2d.fillRect(cx - ALIEN_W/2 + x*2, cy - ALIEN_H/2 + y*2, w*2, h*2);
  // base shape
  if(type === 'top'){
    // squid-like
    [[3,1],[7,1],[2,2],[3,2],[7,2],[8,2],[2,3],[3,3],[4,3],[5,3],[6,3],[7,3],[8,3],
     [1,4],[2,4],[4,4],[5,4],[6,4],[8,4],[9,4],
     [0,5],[1,5],[2,5],[3,5],[4,5],[5,5],[6,5],[7,5],[8,5],[9,5],[10,5],
     [0,6],[2,6],[3,6],[7,6],[8,6],[10,6]].forEach(([x,y])=>px(x,y));
    if(frame===1){ ctx2d.clearRect(cx-ALIEN_W/2+0*2, cy-ALIEN_H/2+6*2, 2,2); ctx2d.clearRect(cx-ALIEN_W/2+10*2, cy-ALIEN_H/2+6*2,2,2); px(1,6); px(9,6); }
  } else if(type === 'mid'){
    // crab-like
    [[2,1],[8,1],[3,2],[7,2],[2,3],[3,3],[4,3],[5,3],[6,3],[7,3],[8,3],
     [1,4],[2,4],[4,4],[5,4],[6,4],[8,4],[9,4],
     [0,5],[1,5],[2,5],[3,5],[4,5],[5,5],[6,5],[7,5],[8,5],[9,5],[10,5],
     [0,6],[2,6],[8,6],[10,6],[1,7],[3,7],[7,7],[9,7]].forEach(([x,y])=>px(x,y));
    if(frame===1){ /* leg swap */ px(0,7); px(10,7); }
  } else {
    // octopus-like
    [[0,2],[1,2],[5,2],[9,2],[10,2],
     [0,3],[1,3],[2,3],[4,3],[5,3],[6,3],[8,3],[9,3],[10,3],
     [0,4],[1,4],[2,4],[3,4],[4,4],[5,4],[6,4],[7,4],[8,4],[9,4],[10,4],
     [2,5],[3,5],[5,5],[7,5],[8,5],
     [1,6],[2,6],[8,6],[9,6],
     [0,7],[1,7],[9,7],[10,7]].forEach(([x,y])=>px(x,y));
    if(frame===1){ /* legs */ px(3,7); px(7,7); }
  }
  ctx2d.shadowBlur = 0;
}

function drawUFO(cx, cy){
  ctx2d.fillStyle = '#ff4a6b';
  ctx2d.shadowColor = '#ff4a6b'; ctx2d.shadowBlur = 12;
  const w=30, h=12;
  ctx2d.beginPath();
  ctx2d.ellipse(cx, cy, w/2, h/2, 0, 0, Math.PI*2);
  ctx2d.fill();
  ctx2d.fillStyle = '#fff';
  for(let i=-1;i<=1;i++){ ctx2d.fillRect(cx + i*7 - 1, cy - 2, 2, 2); }
  ctx2d.shadowBlur = 0;
}

function drawPlayer(cx, cy){
  ctx2d.fillStyle = '#3dff9a';
  ctx2d.shadowColor = '#3dff9a'; ctx2d.shadowBlur = 10;
  // base
  ctx2d.fillRect(cx - PLAYER_W/2, cy + 2, PLAYER_W, 6);
  ctx2d.fillRect(cx - PLAYER_W/2 + 4, cy - 2, PLAYER_W - 8, 4);
  ctx2d.fillRect(cx - 2, cy - 8, 4, 6);
  ctx2d.shadowBlur = 0;
}

function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

/* ====== Input ====== */
function setMove(dir, on){
  if(dir === 'left')  state.input.left  = on;
  if(dir === 'right') state.input.right = on;
}
document.querySelectorAll('.dpad [data-dir]').forEach(btn => {
  const dir = btn.dataset.dir;
  if(dir === 'up' || dir === 'down') return;
  const down = e => { e.preventDefault(); setMove(dir, true); SFX.click(); };
  const up   = e => { e.preventDefault(); setMove(dir, false); };
  btn.addEventListener('touchstart', down, {passive:false});
  btn.addEventListener('touchend',   up,   {passive:false});
  btn.addEventListener('touchcancel',up,   {passive:false});
  btn.addEventListener('mousedown', down);
  btn.addEventListener('mouseup',   up);
  btn.addEventListener('mouseleave',up);
});

document.addEventListener('keydown', e=>{
  if(!state) return;
  if(e.key === 'ArrowLeft')  setMove('left', true);
  if(e.key === 'ArrowRight') setMove('right', true);
  if(e.key === ' ') { e.preventDefault(); actionPress(); }
  if(e.key === 'p' || e.key === 'P') togglePause();
});
document.addEventListener('keyup', e=>{
  if(!state) return;
  if(e.key === 'ArrowLeft')  setMove('left', false);
  if(e.key === 'ArrowRight') setMove('right', false);
  if(e.key === ' ')          actionRelease();
});

const actionBtn = $('btnAction');
function actionPress(){
  if(!state || !running || paused) return;
  // single shot immediately
  firePlayer();
  state.fireQueue.held = true;
  state.fireQueue.state = 'rest';         // after the single shot, small delay before burst kicks in
  state.fireQueue.restUntil = performance.now() + 220;
  actionBtn.style.filter = 'brightness(1.2)';
}
function actionRelease(){
  if(!state) return;
  state.fireQueue.held = false;
  state.fireQueue.state = 'idle';
  actionBtn.style.filter = '';
}
actionBtn.addEventListener('touchstart', e=>{e.preventDefault();actionPress();}, {passive:false});
actionBtn.addEventListener('touchend',   e=>{e.preventDefault();actionRelease();}, {passive:false});
actionBtn.addEventListener('mousedown', actionPress);
actionBtn.addEventListener('mouseup',   actionRelease);
actionBtn.addEventListener('mouseleave',actionRelease);

// Drag on play area → move player horizontally
(function(){
  const play = document.querySelector('.play');
  let dragging = false;
  function toDesignX(clientX){
    const rect = canvas.getBoundingClientRect();
    const rel = (clientX - rect.left) / rect.width;
    return clamp(rel * DESIGN_W, PLAYER_W/2+2, DESIGN_W - PLAYER_W/2 - 2);
  }
  play.addEventListener('touchstart', e=>{ dragging=true; if(state) state.player.x = toDesignX(e.touches[0].clientX); }, {passive:true});
  play.addEventListener('touchmove',  e=>{ if(dragging && state) state.player.x = toDesignX(e.touches[0].clientX); }, {passive:true});
  play.addEventListener('touchend',   ()=>dragging=false);
})();
</script>
